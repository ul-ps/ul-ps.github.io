<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المالية (مصروف/إيراد) | المحاسب الذكي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="finance.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="expenses-page">

    <main>
        <div class="expenses-header">
            <h1 class="expenses-title"><i class="fa-solid fa-money-bill-transfer"></i> المالية (مصروف/إيراد)</h1>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="openAddModal()"><i class="fa-solid fa-plus-circle"></i> إضافة حركة</button>
                <a href="settings.html" class="btn btn-secondary"><i class="fa-solid fa-gears"></i> تعديل البنود</a>
            </div>
        </div>

        <div class="form-list-grid">
            <!-- Mobile Bottom Sheet Overlay (only activates on mobile) -->
            <div class="mobile-form-overlay" id="expense-form-overlay" onclick="closeExpenseModal(event)">
            <div class="stat-card" style="height: fit-content;">
                <button class="mobile-form-close" onclick="closeExpenseModal()">&times;</button>
                <h3>تسجيل حركة</h3>
                <form id="finance-form">

                    <!-- Toggle Expense/Income -->
                    <div class="type-toggle">
                        <input type="radio" name="tx-type" id="type-exp" value="EXPENSE" checked>
                        <label for="type-exp" id="lbl-exp"><i class="fa-solid fa-arrow-up-from-bracket"></i> مصروف</label>

                        <input type="radio" name="tx-type" id="type-inc" value="INCOME">
                        <label for="type-inc" id="lbl-inc"><i class="fa-solid fa-arrow-down-to-bracket"></i> إيراد اضافي</label>
                    </div>

                    <div class="form-group">
                        <label>العملة</label>
                        <select id="ex-currency" required>
                            <!-- JS populated -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label>البند / التصنيف</label>
                        <select id="ex-category" required>
                            <!-- JS populated from Settings -->
                        </select>
                    </div>

                    <div class="form-group" id="partner-select-group"
                        style="display:none; background:#f0f9ff; padding:10px; border-radius:8px; border:1px solid #bae6fd;">
                        <label style="color:#0369a1; font-weight:bold;">اختر الشريك / الموظف</label>
                        <select id="ex-partner">
                            <option value="">-- اختر الاسم --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>المبلغ</label>
                        <input type="number" id="ex-amount" min="0.1" step="0.01" required placeholder="0.00">
                    </div>

                    <div class="form-group">
                        <label>ملاحظات</label>
                        <textarea id="ex-notes" rows="3" placeholder="تفاصيل..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" id="save-btn" style="width: 100%;">حفظ</button>
                </form>
            </div>
        </div>

        <!-- List -->
            <div class="table-container">
                <div class="filters-bar" style="margin-bottom:15px; padding:10px; gap:8px;">
                    <h3 style="flex:1; min-width:100%; margin-bottom:5px;">سجل الحركات</h3>
                    <div style="display:flex; gap:8px; flex-wrap:wrap; width:100%;">
                        <input type="date" id="filter-date" class="filter-control" style="flex:1; min-width:140px;">
                        <select id="filter-period" class="filter-control" style="flex:1; min-width:120px;">
                            <option value="ALL">كل الوقت</option>
                            <option value="TODAY">اليوم</option>
                            <option value="WEEK" selected>آخر أسبوع</option>
                            <option value="MONTH">هذا الشهر</option>
                        </select>
                        <button class="btn btn-secondary" style="padding:0 15px; height:42px;"
                            onclick="printTransactions()" title="طباعة السجل الحالي"><i class="fa-solid fa-print"></i></button>
                    </div>
                </div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>التاريخ</th>
                                <th>النوع</th>
                                <th>البند</th>
                                <th>المبلغ</th>
                                <th>ملاحظات</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="expenses-list">
                            <!-- Loaded dynamically -->
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination -->
                <div id="pagination-container" style="display:flex; justify-content:center; gap:8px; margin-top:20px; flex-wrap:wrap;">
                    <!-- Dynamic Buttons -->
                </div>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script>
        // --- Mobile Bottom Sheet Controls ---
        window.openAddModal = function () {
            if (window.innerWidth <= 768) {
                document.getElementById('expense-form-overlay').classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        };

        window.closeExpenseModal = function (e) {
            if (!e || e.target === document.getElementById('expense-form-overlay')) {
                document.getElementById('expense-form-overlay').classList.remove('active');
                document.body.style.overflow = '';
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('finance-form');
            const tbody = document.getElementById('expenses-list');
            const catSelect = document.getElementById('ex-category');
            const curSelect = document.getElementById('ex-currency');
            const saveBtn = document.getElementById('save-btn');
            const radios = document.getElementsByName('tx-type');
            let currentPage = 1;
            const itemsPerPage = 30;

            // Init dropdowns
            curSelect.innerHTML = UI.getCurrencyOptions();

            function updateCategories() {
                const cats = store.getExpenseCategories();
                catSelect.innerHTML = '<option value="">-- اختر --</option>';
                cats.forEach(c => {
                    catSelect.innerHTML += `<option value="${c}">${c}</option>`;
                });

                // Add Partner/Staff categories
                const payoutCat = "سحب / سلفة / سداد لموظف";
                const investCat = "إيداع / استثمار / سداد من موظف";

                if (!cats.includes(payoutCat)) catSelect.innerHTML += `<option value="${payoutCat}">${payoutCat}</option>`;
                if (!cats.includes(investCat)) catSelect.innerHTML += `<option value="${investCat}">${investCat}</option>`;

                if (!cats.includes('أخرى')) catSelect.innerHTML += `<option value="أخرى">أخرى</option>`;
            }

            function loadPartners() {
                const staff = store.getEmployees();
                const pSelect = document.getElementById('ex-partner');
                pSelect.innerHTML = '<option value="">-- اختر الاسم --</option>';
                staff.forEach(p => {
                    pSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`;
                });
            }
            loadPartners();

            catSelect.addEventListener('change', () => {
                const partnerGroup = document.getElementById('partner-select-group');
                const val = catSelect.value;
                const isLinked = val === "سحب / سلفة / سداد لموظف" || val === "إيداع / استثمار / سداد من موظف";
                if (isLinked) {
                    partnerGroup.style.display = 'block';
                    document.getElementById('ex-partner').required = true;
                } else {
                    partnerGroup.style.display = 'none';
                    document.getElementById('ex-partner').required = false;
                }
            });

            // UI Toggles
            radios.forEach(r => r.addEventListener('change', () => {
                if (r.value === 'INCOME') {
                    saveBtn.textContent = 'تسجيل الإيراد';
                    saveBtn.className = 'btn btn-success';
                    saveBtn.style.width = '100%';
                } else {
                    saveBtn.textContent = 'تسجيل المصروف';
                    saveBtn.className = 'btn btn-danger';
                    saveBtn.style.width = '100%';
                }
            }));
            // Trigger once
            radios[0].dispatchEvent(new Event('change'));

            let editingId = null;

            const filterDate = document.getElementById('filter-date');
            const filterPeriod = document.getElementById('filter-period');

            function loadList() {
                let list = store.data.expenses.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                // Filtering Logic
                const period = filterPeriod.value;
                const manualDate = filterDate.value ? new Date(filterDate.value) : null;
                const now = new Date();

                list = list.filter(ex => {
                    const d = new Date(ex.createdAt);
                    if (manualDate) return d.toDateString() === manualDate.toDateString();
                    if (period === 'TODAY') return d.toDateString() === now.toDateString();
                    if (period === 'WEEK') {
                        const weekAgo = new Date(); weekAgo.setDate(now.getDate() - 7);
                        return d >= weekAgo;
                    }
                    if (period === 'MONTH') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                    return true;
                });

                tbody.innerHTML = '';

                // Pagination Logic
                const totalItems = list.length;
                const totalPages = Math.ceil(totalItems / itemsPerPage);
                
                if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
                if (currentPage < 1) currentPage = 1;

                const startIdx = (currentPage - 1) * itemsPerPage;
                const paginatedItems = list.slice(startIdx, startIdx + itemsPerPage);

                paginatedItems.forEach(ex => {
                    const isIncome = ex.type === 'INCOME';
                    const tr = document.createElement('tr');
                    tr.style.background = isIncome ? '#f0fdf4' : 'transparent';
                    tr.innerHTML = `
                        <td data-label="التاريخ">${new Date(ex.createdAt).toLocaleDateString('ar-EG')}</td>
                        <td data-label="النوع">${isIncome ? '<span class="badge badge-success">إيراد</span>' : '<span class="badge badge-danger">مصروف</span>'}</td>
                        <td data-label="البند">${ex.category}</td>
                        <td data-label="المبلغ" style="font-weight:bold; color:${isIncome ? 'var(--success)' : 'var(--danger)'}">
                            ${UI.formatMoney(ex.amount, ex.currency)}
                        </td>
                        <td data-label="ملاحظات">${ex.notes || '-'}</td>
                        <td>
                            <div style="display:flex; gap:5px;">
                                <button class="btn btn-secondary" style="padding:4px 8px; font-size:0.75rem;" onclick='editExpense(${JSON.stringify(ex)})'><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="btn btn-danger" style="padding:4px 8px; font-size:0.75rem;" onclick="deleteExpense('${ex.id}')"><i class="fa-solid fa-xmark"></i></button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                
                renderPagination(totalPages);

                if (list.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">لا توجد حركات في هذه الفترة</td></tr>';
                    document.getElementById('pagination-container').innerHTML = '';
                }

                // Keep the filtered list accessible for printing
                window.currentFilteredTXs = list;
            }

            function renderPagination(totalPages) {
                const pagContainer = document.getElementById('pagination-container');
                pagContainer.innerHTML = '';
                if (totalPages <= 1) return;

                // Prev
                const prevBtn = document.createElement('button');
                prevBtn.className = 'btn btn-secondary';
                prevBtn.innerHTML = '<i class="fa-solid fa-chevron-right"></i>';
                prevBtn.disabled = currentPage === 1;
                prevBtn.onclick = () => { currentPage--; loadList(); };
                pagContainer.appendChild(prevBtn);

                // Pages
                let startPage = Math.max(1, currentPage - 2);
                let endPage = Math.min(totalPages, startPage + 4);
                if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

                for (let i = startPage; i <= endPage; i++) {
                    const btn = document.createElement('button');
                    btn.className = i === currentPage ? 'btn btn-primary' : 'btn btn-secondary';
                    btn.style.minWidth = '40px';
                    btn.textContent = i;
                    btn.onclick = () => { currentPage = i; loadList(); };
                    pagContainer.appendChild(btn);
                }

                // Next
                const nextBtn = document.createElement('button');
                nextBtn.className = 'btn btn-secondary';
                nextBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
                nextBtn.disabled = currentPage === totalPages;
                nextBtn.onclick = () => { currentPage++; loadList(); };
                pagContainer.appendChild(nextBtn);
            }

            window.printTransactions = () => {
                const txs = window.currentFilteredTXs || [];
                if (txs.length === 0) {
                    alert('لا توجد بيانات لطباعتها');
                    return;
                }

                const printWindow = window.open('', '_blank');
                let rowsHtml = '';
                txs.forEach(ex => {
                    const isIncome = ex.type === 'INCOME';
                    rowsHtml += `
                        <tr>
                            <td>${new Date(ex.createdAt).toLocaleDateString('ar-EG')}</td>
                            <td>${isIncome ? 'إيراد' : 'مصروف'}</td>
                            <td>${ex.category}</td>
                            <td style="font-weight:bold;">${UI.formatMoney(ex.amount, ex.currency)}</td>
                            <td>${ex.notes || '-'}</td>
                        </tr>
                    `;
                });

                const content = `
                    <html dir="rtl" lang="ar">
                    <head>
                        <title>${store.getBranding().name} - سجل حركات الصندوق - ${new Date().toLocaleDateString()}</title>
                        <style>
                            body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; color: #333; }
                            .header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
                            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                            th, td { border: 1px solid #eee; padding: 12px; text-align: right; }
                            th { background: #f9f9f9; }
                            .footer { margin-top: 50px; text-align: center; font-size: 0.9rem; color: #777; border-top: 1px solid #eee; padding-top: 20px; }
                        </style>
                    </head>
                    <body>
                        <div class="header">
                            ${store.getBranding().logo ? `<img src="${store.getBranding().logo}" style="height:60px; margin-bottom:10px;">` : ''}
                            <h1>سجل حركات الصندوق</h1>
                            <p>${store.getBranding().name}</p>
                            <p>الفترة: ${document.getElementById('filter-period').options[document.getElementById('filter-period').selectedIndex].text}</p>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>التاريخ</th>
                                    <th>النوع</th>
                                    <th>البند</th>
                                    <th>المبلغ</th>
                                    <th>ملاحظات</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rowsHtml}
                            </tbody>
                        </table>
                        <div class="footer">
                            <p>تم استخراج هذا التقرير بتاريخ: ${new Date().toLocaleString('ar-EG')}</p>
                        </div>
                        <script>window.print(); setTimeout(() => window.close(), 500);<\/script>
                    </body>
                    </html>
                `;
                printWindow.document.write(content);
                printWindow.document.close();
            };

            // Listeners
            filterPeriod.addEventListener('change', () => { currentPage = 1; loadList(); });
            filterDate.addEventListener('change', () => { currentPage = 1; loadList(); });

            window.deleteExpense = (id) => {
                UI.confirm('حذف هذه الحركة؟', 'حذف بند مالي', () => {
                    store.deleteExpense(id);
                    loadList();
                });
            };

            window.editExpense = (ex) => {
                editingId = ex.id;

                // Set Type
                const isIncome = ex.type === 'INCOME';
                if (isIncome) document.getElementById('type-inc').checked = true;
                else document.getElementById('type-exp').checked = true;
                radios[0].dispatchEvent(new Event('change')); // Update UI

                // Set Values
                catSelect.value = ex.category;
                curSelect.value = ex.currency || 'ILS';
                document.getElementById('ex-amount').value = ex.amount;
                document.getElementById('ex-notes').value = ex.notes || '';

                saveBtn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> حفظ التعديلات';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const type = document.querySelector('input[name="tx-type"]:checked').value;

                try {
                    if (editingId) {
                        store.deleteExpense(editingId);
                    }

                    store.addExpense({
                        type,
                        category: catSelect.value,
                        currency: curSelect.value,
                        amount: document.getElementById('ex-amount').value,
                        notes: document.getElementById('ex-notes').value,
                        partnerId: (document.getElementById('partner-select-group').style.display === 'block') ? document.getElementById('ex-partner').value : null,
                        date: new Date().toISOString()
                    });

                    form.reset();
                    editingId = null;
                    radios[0].checked = true; radios[0].dispatchEvent(new Event('change')); // Reset UI

                    loadList();
                    UI.toast('تم الحفظ بنجاح');
                    
                    if (typeof closeExpenseModal === 'function') {
                        closeExpenseModal();
                    }
                } catch (err) {
                    UI.toast('خطأ: ' + err.message, 'danger');
                }
            });

            updateCategories();
            loadList();
        });
    </script>
</body>

</html>
