<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الطرود | المحاسب الذكي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        .shipment-card {
            background: white;
            padding: 1rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-right: 4px solid var(--primary-color);
            margin-bottom: 1rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #f1f5f9;
        }

        .detail-label {
            color: #64748b;
            font-weight: 500;
        }

        .detail-value {
            color: #1e293b;
            font-weight: 700;
        }

        .shipment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        /* Mobile Responsive Fixes */
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
                padding: 10px;
            }

            .page-header>div {
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }

            .page-header select,
            .page-header button {
                flex: 1;
                min-width: 0;
                font-size: 0.85rem;
                padding: 8px 12px;
            }

            .table-container {
                padding: 0 10px;
                background: transparent;
                box-shadow: none;
            }

            table,
            thead,
            tbody {
                display: block;
                width: 100%;
            }

            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }

            tbody {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px;
            }

            tr {
                display: flex;
                flex-direction: column;
                background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
                border-radius: 20px;
                padding: 15px;
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
                border: 2px solid transparent;
                background-clip: padding-box;
                position: relative;
                transition: all 0.3s ease;
            }

            tr::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                border-radius: 18px;
                padding: 2px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                -webkit-mask-composite: xor;
                mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                mask-composite: exclude;
                opacity: 0;
                transition: opacity 0.3s ease;
            }

            tr:hover::before {
                opacity: 1;
            }

            tr:hover {
                transform: translateY(-4px);
                box-shadow: 0 12px 30px rgba(102, 126, 234, 0.2);
            }

            th,
            td {
                display: block;
                width: 100%;
                text-align: right;
            }

            td {
                border: none;
                padding: 6px 0;
                font-size: 0.85rem;
                position: relative;
            }

            td::before {
                content: attr(data-label);
                display: block;
                font-weight: 800;
                color: #667eea;
                font-size: 0.7rem;
                margin-bottom: 3px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .actions-cell {
                display: flex;
                justify-content: center;
                gap: 6px;
                padding-top: 12px;
                border-top: 2px dashed #e2e8f0;
                margin-top: 10px;
                flex-wrap: wrap;
            }

            .actions-cell::before {
                display: none;
            }

            .actions-cell button {
                flex: 1;
                min-width: 0;
                font-size: 0.75rem;
                padding: 6px 8px;
            }
        }

        /* Product Thumbnails in Modal */
        .item-thumb {
            width: 45px;
            height: 45px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .item-thumb-placeholder {
            width: 45px;
            height: 45px;
            background: #f1f5f9;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #94a3b8;
            border: 1px solid #e2e8f0;
        }

        html,
        body {
            overflow-x: hidden !important;
            max-width: 100vw;
        }

        .page-header {
            max-width: 100vw;
            overflow: hidden;
        }
    </style>
</head>

<body>

    <main>
        <div class="page-header">
            <h1 class="page-title"><i class="fa-solid fa-truck-fast"></i> سجل الطرود (Shipments)</h1>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-secondary" onclick="exportToExcel()"><i class="fa-solid fa-file-excel"></i> تصدير إكسل</button>
                <button class="btn btn-secondary" onclick="printShipmentsList()"
                    style="background:#6366f1; color:white; border:none;"><i class="fa-solid fa-print"></i> طباعة الكل</button>
            </div>
        </div>

        <div class="filters-bar" style="display: flex; flex-wrap: wrap; gap: 12px; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; align-items: flex-end;">
            <div style="flex: 2; min-width: 250px;">
                <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #64748b; margin-bottom: 8px;">البحث عن طرد</label>
                <div class="search-input-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="shipment-search" class="search-input-premium" placeholder="ابحث برقم الطلب أو اسم العميل..." oninput="renderShipments()">
                </div>
            </div>

            <div style="flex: 1; min-width: 150px;">
                <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #64748b; margin-bottom: 8px;">شركة التوصيل</label>
                <select id="company-filter" class="search-input-premium" style="padding-right: 15px !important;" onchange="renderShipments()">
                    <option value="ALL">جميع الشركات</option>
                </select>
            </div>

            <div style="flex: 1; min-width: 150px;">
                <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #64748b; margin-bottom: 8px;">حالة الطرد</label>
                <select id="status-filter" class="search-input-premium" style="padding-right: 15px !important;" onchange="renderShipments()">
                    <option value="ALL">جميع الحالات</option>
                    <option value="DELIVERED">تم التسليم</option>
                    <option value="IN_DELIVERY">قيد التوصيل</option>
                    <option value="RETURNED">مرتجع</option>
                    <option value="CANCELLED">ملغي</option>
                    <option value="SCHEDULED">مؤجل</option>
                </select>
            </div>

            <div style="flex: 1; min-width: 150px;">
                <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #64748b; margin-bottom: 8px;">من تاريخ</label>
                <input type="date" id="date-from" class="search-input-premium" onchange="renderShipments()">
            </div>

            <div style="flex: 1; min-width: 150px;">
                <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #64748b; margin-bottom: 8px;">إلى تاريخ</label>
                <input type="date" id="date-to" class="search-input-premium" onchange="renderShipments()">
            </div>
            
            <button class="btn btn-secondary" onclick="resetFilters()" style="height: 48px; display: flex; align-items: center; justify-content: center; background: #f1f5f9; color: #64748b; border: none; border-radius: 12px; padding: 0 15px;">
                <i class="fa-solid fa-filter-circle-xmark"></i>
            </button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>رقم الطلب</th>
                        <th>التاريخ</th>
                        <th>العميل</th>
                        <th>شركة التوصيل</th>
                        <th>المنطقة</th>
                        <th>التكلفة</th>
                        <th>الحالة</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="shipment-list">
                    <!-- Loaded dynamically -->
                </tbody>
            </table>
        </div>
    </main>

    <div id="shipment-modal" class="modal-overlay" onclick="if(event.target==this) closeShipmentModal()">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fa-solid fa-magnifying-glass"></i> معاينة تفاصيل الطرد</h3>
                <button class="modal-close" onclick="closeShipmentModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="shipment-detail-body" class="modal-body">
                <!-- Data here -->
            </div>
            <div
                style="padding: 1.5rem; background: #f8fafc; border-top: 1px solid #f1f5f9; text-align: left; display: flex; justify-content: flex-end; gap:10px;">
                <button class="btn btn-primary" id="print-shipment-btn" style="background:var(--primary-color); color:white; border:none;">
                    <i class="fa-solid fa-print"></i> طباعة الفاتورة
                </button>
                <button class="btn btn-secondary" onclick="closeShipmentModal()">إغلاق</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const list = document.getElementById('shipment-list');
            const filter = document.getElementById('company-filter');

            // Populate Filter
            const cos = store.getDeliveryCompanies();
            cos.forEach(co => {
                const opt = document.createElement('option');
                opt.value = co.id;
                opt.textContent = co.name;
                filter.appendChild(opt);
            });

            window.renderShipments = () => {
                const search = document.getElementById('shipment-search').value.toLowerCase();
                const selectedCo = filter.value;
                const selectedStatus = document.getElementById('status-filter').value;
                const dateFrom = document.getElementById('date-from').value;
                const dateTo = document.getElementById('date-to').value;

                list.innerHTML = '';

                const filtered = store.data.shipments
                    .sort((a, b) => new Date(b.date) - new Date(a.date))
                    .filter(s => {
                        // Search filter (ID or Customer Name)
                        const matchesSearch = s.orderId.toString().toLowerCase().includes(search) || 
                                              s.customerName.toLowerCase().includes(search);
                        
                        // Company filter
                        const matchesCo = selectedCo === 'ALL' || s.companyId === selectedCo;
                        
                        // Status filter
                        const matchesStatus = selectedStatus === 'ALL' || s.status === selectedStatus;
                        
                        // Date filter
                        let matchesDate = true;
                        if (dateFrom || dateTo) {
                            const shipDate = new Date(s.date).setHours(0,0,0,0);
                            if (dateFrom) {
                                const from = new Date(dateFrom).setHours(0,0,0,0);
                                if (shipDate < from) matchesDate = false;
                            }
                            if (dateTo) {
                                const to = new Date(dateTo).setHours(0,0,0,0);
                                if (shipDate > to) matchesDate = false;
                            }
                        }

                        return matchesSearch && matchesCo && matchesStatus && matchesDate;
                    });

                filtered.forEach(s => {
                    const tr = document.createElement('tr');
                    const dateStr = new Date(s.date).toLocaleDateString('ar-EG');

                    let statusBadge = '';
                    if (s.status === 'CANCELLED') statusBadge = '<span class="badge badge-danger">ملغي</span>';
                    else if (s.status === 'RETURNED') statusBadge = '<span class="badge badge-warning">مرتجع</span>';
                    else if (s.status === 'IN_DELIVERY') statusBadge = '<span class="badge" style="background:#e0f2fe; color:#075985;"><i class="fa-solid fa-truck-fast"></i> قيد التوصيل</span>';
                    else if (s.status === 'SCHEDULED') statusBadge = '<span class="badge" style="background:#fffbeb; color:#92400e;"><i class="fa-solid fa-hourglass-half"></i> مؤجل</span>';
                    else statusBadge = '<span class="badge badge-success"><i class="fa-solid fa-check-circle"></i> تم التسليم</span>';

                    tr.innerHTML = `
                        <td data-label="رقم الطلب" style="font-family:monospace;">${s.orderId.toString().startsWith('A-') ? s.orderId : '#' + s.orderId.substr(-8)}</td>
                        <td data-label="التاريخ">${dateStr}</td>
                        <td data-label="العميل" style="font-weight:bold;">${s.customerName}</td>
                        <td data-label="شركة التوصيل" style="color:var(--primary-color);">${s.companyName}</td>
                        <td data-label="المنطقة">${s.areaName}</td>
                        <td data-label="التكلفة" style="font-weight:bold;">${parseFloat(s.price).toLocaleString()}</td>
                        <td data-label="الحالة">${statusBadge}</td>
                        <td data-label="إجراءات" class="actions-cell">
                            <button class="btn btn-secondary" style="padding:4px 10px; font-size:0.8rem;" onclick="viewShipmentDetail('${s.orderId}')" title="معاينة"><i class="fa-solid fa-eye"></i></button>
                            <button class="btn btn-secondary" style="padding:4px 10px; font-size:0.8rem; background:#6366f1; color:white; border:none;" onclick="UI.printShipment('${s.orderId}')" title="طباعة"><i class="fa-solid fa-print"></i></button>
                            <button class="btn btn-primary" style="padding:4px 10px; font-size:0.8rem;" onclick="changeStatus('${s.orderId}', 'IN_DELIVERY')" title="شحن"><i class="fa-solid fa-truck-fast"></i></button>
                            <button class="btn btn-success" style="padding:4px 10px; font-size:0.8rem;" onclick="changeStatus('${s.orderId}', 'DELIVERED')" title="إتمام"><i class="fa-solid fa-check-circle"></i></button>
                            <button class="btn" style="background:#f97316; color:white; padding:4px 10px; font-size:0.8rem;" onclick="changeStatus('${s.orderId}', 'RETURNED')" title="إرجاع"><i class="fa-solid fa-arrow-rotate-left"></i></button>
                            <button class="btn btn-danger" style="padding:4px 10px; font-size:0.8rem;" onclick="changeStatus('${s.orderId}', 'CANCELLED')" title="إلغاء"><i class="fa-solid fa-times-circle"></i></button>
                        </td>
                    `;
                    list.appendChild(tr);
                });

                if (filtered.length === 0) {
                    list.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:3rem; color:#aaa;">لا توجد طرود مطابقة للبحث.</td></tr>';
                }

                // Cache for printing
                window.lastFilteredShipments = filtered;
            };

            window.resetFilters = () => {
                document.getElementById('shipment-search').value = '';
                document.getElementById('company-filter').value = 'ALL';
                document.getElementById('status-filter').value = 'ALL';
                document.getElementById('date-from').value = '';
                document.getElementById('date-to').value = '';
                renderShipments();
            };

            filter.addEventListener('change', renderShipments);
            renderShipments();
            window.viewShipmentDetail = (orderId) => {
                const modal = document.getElementById('shipment-modal');
                const body = document.getElementById('shipment-detail-body');
                const printBtn = document.getElementById('print-shipment-btn');
                
                if (printBtn) printBtn.onclick = () => UI.printShipment(orderId);
                
                modal.classList.add('active');
                body.innerHTML = '<div style="text-align:center; padding:20px;">جاري التحميل...</div>';

                try {
                    const s = store.data.shipments.find(x => x.orderId == orderId);
                    const o = store.data.orders.find(x => x.id == orderId);

                    if (!s) {
                        body.innerHTML = '<div style="text-align:center; padding:20px; color:red;">خطأ: لم يتم العثور على بيانات الشحن لهذا الطلب.</div>';
                        return;
                    }

                    let itemsHtml = '';
                    if (o && o.cartItems && Array.isArray(o.cartItems) && o.cartItems.length > 0) {
                        itemsHtml = `
                            <div style="margin-top:20px; background:#f8fafc; padding:15px; border-radius:15px; border:1px solid #e2e8f0;">
                                <div style="font-weight:900; color:var(--text-main); margin-bottom:15px; display:flex; align-items:center; gap:8px;">
                                    <i class="fa-solid fa-list-check"></i> محتويات الطرد
                                </div>
                                ${o.cartItems.map(item => {
                                    const itemImg = UI.getItemImage(item.name, item);
                                    const qty = item.qty || 1;
                                    return `
                                        <div class="detail-row" style="align-items:center; border-bottom:1px dashed #e2e8f0; padding-bottom:10px; margin-bottom:10px;">
                                            <div style="display:flex; align-items:center; gap:12px;">
                                                ${itemImg ? `<img src="${itemImg}" class="item-thumb">` : '<div class="item-thumb-placeholder"><i class="fa-solid fa-image"></i></div>'}
                                                <div style="display:flex; flex-direction:column;">
                                                    <span style="font-weight:700; color:var(--text-main); font-size:0.9rem;">${item.name}</span>
                                                    <span style="font-size:0.75rem; color:#64748b;">العدد: ${qty}</span>
                                                </div>
                                            </div>
                                            <span style="font-weight:900; color:var(--primary-color);">${((item.price || 0) * qty).toLocaleString()} ${o.currency || ''}</span>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        `;
                    } else if (o && o.itemsText) {
                        itemsHtml = `
                            <div style="margin-top:20px; background:#f8fafc; padding:15px; border-radius:15px; border:1px solid #e2e8f0;">
                                <div style="font-weight:900; color:var(--text-main); margin-bottom:10px; display:flex; align-items:center; gap:8px;">
                                    <i class="fa-solid fa-list-check"></i> ملخص المحتويات
                                </div>
                                <div style="font-size:0.9rem; color:#64748b; line-height:1.6;">${o.itemsText}</div>
                            </div>
                        `;
                    } else {
                        itemsHtml = `
                            <div style="margin-top:20px; background:#f8fafc; padding:15px; border-radius:15px; border:1px solid #e2e8f0; text-align:center; color:#94a3b8;">
                                <i class="fa-solid fa-circle-info"></i> لا توجد تفاصيل إضافية متاحة.
                            </div>
                        `;
                    }

                    const safeDate = s.date ? new Date(s.date).toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) : 'غير متوفر';

                    const statusActions = `
                        <div style="margin-top:20px; padding-top:15px; border-top:1px solid #e2e8f0; display:flex; gap:8px; flex-wrap:wrap; justify-content:center;">
                            <div style="width:100%; text-align:center; font-weight:700; margin-bottom:10px; font-size:0.9rem; color:#64748b;">تحديث حالة الطرد:</div>
                            <button class="btn btn-primary" style="padding:8px 15px; font-size:0.9rem;" onclick="changeStatus('${orderId}', 'IN_DELIVERY')"><i class="fa-solid fa-truck-fast"></i> شحن</button>
                            <button class="btn btn-success" style="padding:8px 15px; font-size:0.9rem;" onclick="changeStatus('${orderId}', 'DELIVERED')"><i class="fa-solid fa-check-circle"></i> إتمام</button>
                            <button class="btn" style="background:#f97316; color:white; padding:8px 15px; font-size:0.9rem;" onclick="changeStatus('${orderId}', 'RETURNED')"><i class="fa-solid fa-arrow-rotate-left"></i> إرجاع</button>
                            <button class="btn btn-danger" style="padding:8px 15px; font-size:0.9rem;" onclick="changeStatus('${orderId}', 'CANCELLED')"><i class="fa-solid fa-times-circle"></i> إلغاء</button>
                        </div>
                    `;

                    body.innerHTML = `
                            <div class="shipment-info">
                                <span class="ship-icon"><i class="fa-solid fa-truck"></i></span>
                                <div class="ship-details">
                                    <div class="ship-cust">${s.customerName}</div>
                                    <div class="ship-meta">#${s.orderId.substr(-6)} • ${s.companyName}</div>
                                </div>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">العميل</span>
                                <span class="detail-value">${s.customerName || 'غير معروف'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">شركة التوصيل</span>
                                <span class="detail-value">${s.companyName || 'غير متوفر'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">المنطقة</span>
                                <span class="detail-value">${s.areaName || 'غير محددة'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">تكلفة التوصيل</span>
                                <span class="detail-value">${parseFloat(s.price || 0).toLocaleString()}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">الحالة</span>
                                <span class="detail-value">
                                    ${s.status === 'CANCELLED' ? '<span class="badge badge-danger">ملغي</span>' :
                                      s.status === 'RETURNED' ? '<span class="badge badge-warning">مرتجع</span>' :
                                      s.status === 'IN_DELIVERY' ? '<span class="badge" style="background:#e0f2fe; color:#075985;"><i class="fa-solid fa-truck-fast"></i> قيد التوصيل</span>' :
                                      s.status === 'SCHEDULED' ? '<span class="badge" style="background:#fffbeb; color:#92400e;"><i class="fa-solid fa-hourglass-half"></i> مؤجل</span>' :
                                      '<span class="badge badge-success"><i class="fa-solid fa-check-circle"></i> تم التسليم</span>'}
                                </span>
                            </div>
                            <div class="detail-row" style="margin-top:10px; padding-top:10px; border-top:2px solid #f1f5f9;">
                                <span class="detail-label" style="font-weight:800;">إجمالي التحصيل</span>
                                <span class="detail-value" style="font-size:1.3rem; color:var(--primary-color);">
                                    ${o ? (parseFloat(o.total || 0).toLocaleString() + ' ' + (o.currency || '')) : 'غير متوفر'}
                                </span>
                            </div>
                            ${itemsHtml}
                            ${statusActions}
                        `;
                } catch (err) {
                    console.error("Error displaying shipment detail:", err);
                    body.innerHTML = `<div style="text-align:center; padding:20px; color:red;">خطأ أثناء جلب البيانات.</div>`;
                }
            };
            window.changeStatus = (orderId, newStatus) => {
                const labels = {
                    'IN_DELIVERY': 'مشحون/قيد التوصيل',
                    'DELIVERED': 'مكتمل/تم التسليم',
                    'RETURNED': 'مرتجع',
                    'CANCELLED': 'ملغي'
                };
                UI.confirm(`هل أنت متأكد من تغيير حالة هذا الطرد إلى (${labels[newStatus]})؟`, 'تحديث الحالة', () => {
                    store.updateOrderStatus(orderId, newStatus);
                    closeShipmentModal();
                    renderShipments();
                });
            };
        });

        window.closeShipmentModal = () => {
            document.getElementById('shipment-modal').classList.remove('active');
        };

        window.exportToExcel = () => {
            const shipments = window.lastFilteredShipments || store.data.shipments || [];
            if (shipments.length === 0) {
                alert('لا توجد شحنات للتصدير');
                return;
            }

            try {
                const data = shipments.map(s => ({
                    'رقم الطلب': s.orderId,
                    'التاريخ': new Date(s.date).toLocaleDateString('ar-EG'),
                    'العميل': s.customerName,
                    'شركة التوصيل': s.companyName,
                    'المنطقة': s.areaName,
                    'تكلفة التوصيل': s.price,
                    'الحالة': s.status === 'CANCELLED' ? 'ملغي' : s.status === 'RETURNED' ? 'مرتجع' : s.status === 'IN_DELIVERY' ? 'قيد التوصيل' : s.status === 'SCHEDULED' ? 'مؤجل' : 'تم التسليم'
                }));

                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "الشحنات");
                XLSX.writeFile(wb, "shipments_list.xlsx");
            } catch (err) {
                alert('حدث خطأ أثناء التصدير: ' + err.message);
            }
        };

        window.printShipmentsList = () => {
            const shipments = window.lastFilteredShipments || [];
            if (shipments.length === 0) {
                alert('لا توجد طرود لطباعتها');
                return;
            }

            const brand = store.getBranding();
            const logoHtml = brand.logo
                ? `<img src="${brand.logo}" style="height:60px; margin-bottom:10px;">`
                : '';

            // Get Current Filter Text
            const searchVal = document.getElementById('shipment-search').value;
            const companyVal = document.getElementById('company-filter').options[document.getElementById('company-filter').selectedIndex].text;
            const statusVal = document.getElementById('status-filter').options[document.getElementById('status-filter').selectedIndex].text;
            const dateFrom = document.getElementById('date-from').value;
            const dateTo = document.getElementById('date-to').value;

            let filterSummary = [];
            if (searchVal) filterSummary.push(`بحث: ${searchVal}`);
            if (companyVal !== 'جميع الشركات') filterSummary.push(`الشركة: ${companyVal}`);
            if (statusVal !== 'جميع الحالات') filterSummary.push(`الحالة: ${statusVal}`);
            if (dateFrom) filterSummary.push(`من: ${dateFrom}`);
            if (dateTo) filterSummary.push(`إلى: ${dateTo}`);

            const filterHeader = filterSummary.length > 0 
                ? `<div style="background:#f1f5f9; padding:10px; border-radius:8px; margin-bottom:20px; font-size:0.9rem; color:#475569;"><strong>الفلاتر النشطة:</strong> ${filterSummary.join(' | ')}</div>`
                : '';

            let rowsHtml = '';
            let totalDelivery = 0;
            shipments.forEach(s => {
                totalDelivery += parseFloat(s.price || 0);
                rowsHtml += `
                        <tr>
                            <td style="font-family:monospace;">${s.orderId.toString().startsWith('A-') ? s.orderId : '#' + s.orderId.substr(-8)}</td>
                            <td>${new Date(s.date).toLocaleDateString('ar-EG')}</td>
                            <td>${s.customerName}</td>
                            <td>${s.companyName}</td>
                            <td>${s.areaName}</td>
                            <td style="font-weight:bold;">${parseFloat(s.price).toLocaleString()}</td>
                            <td>${s.status === 'CANCELLED' ? 'ملغي' : s.status === 'RETURNED' ? 'مرتجع' : s.status === 'IN_DELIVERY' ? 'قيد التوصيل' : s.status === 'SCHEDULED' ? 'مؤجل' : 'تم التسليم'}</td>
                        </tr>
                    `;
            });

            const printWindow = window.open('', '_blank');
            const content = `
                    <html dir="rtl" lang="ar">
                    <head>
                        <title>سجل شحنات ${brand.name}</title>
                        <style>
                            @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
                            body { font-family: 'Cairo', sans-serif; padding: 40px; color: #333; }
                            .header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
                            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                            th, td { border: 1px solid #eee; padding: 12px; text-align: right; }
                            th { background: #f8f9fa; font-weight: 700; }
                            .summary { margin-top: 30px; padding: 15px; background: #f8fafc; border-radius: 10px; border: 1px solid #e2e8f0; display: inline-block; min-width: 250px; }
                            .footer { margin-top: 50px; text-align: center; font-size: 0.9rem; color: #777; border-top: 1px solid #eee; padding-top: 20px; }
                        </style>
                    </head>
                    <body>
                        <div class="header">
                            ${logoHtml}
                            <h1 style="margin:5px 0;">سجل شحنات ${brand.name}</h1>
                            <p>تقرير الطرود الصادرة - بتاريخ: ${new Date().toLocaleString('ar-EG')}</p>
                        </div>
                        ${filterHeader}
                        <table>
                            <thead>
                                <tr>
                                    <th>رقم الطلب</th>
                                    <th>التاريخ</th>
                                    <th>العميل</th>
                                    <th>الشركة</th>
                                    <th>المنطقة</th>
                                    <th>التكلفة</th>
                                    <th>الحالة</th>
                                </tr>
                            </thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>
                        <div class="summary">
                            <div style="margin-bottom:8px;">عدد اجمالي الطرود: <strong>${shipments.length}</strong></div>
                            <div style="font-size:1.1rem;">إجمالي تكاليف التوصيل: <strong>${totalDelivery.toLocaleString()}</strong></div>
                        </div>
                        <div class="footer">
                            <p>تم استخراج هذا التقرير آلياً</p>
                        </div>
                        <script>window.print(); setTimeout(() => window.close(), 500);<\/script>
                    </body>
                    </html>
                `;
            printWindow.document.write(content);
            printWindow.document.close();
        };
    </script>
</body>

</html>
