<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنتجات والمخزون | المحاسب الذكي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .default-img-text {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
            font-size: 3.5rem;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        }

        /* Product Card Redesign */
        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #f1f5f9;
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-color: var(--primary-light);
        }

        .product-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid #f1f5f9;
        }

        .product-info {
            padding: 1.25rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .product-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: #1e293b;
            margin: 0;
            line-height: 1.4;
        }

        .price-tag {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--primary-color);
            background: #f5f3ff;
            padding: 4px 12px;
            border-radius: 8px;
        }

        .stock-badge-pill {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            background: #f1f5f9;
            color: #64748b;
        }

        .stock-low {
            background: #fff7ed;
            color: #ea580c;
            border: 1px solid #fed7aa;
        }

        .category-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px dashed #f1f5f9;
        }

        .action-btn-mini {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            font-size: 1.1rem;
            background: #f8fafc;
        }

        .action-btn-mini:hover {
            transform: scale(1.1);
        }

        .btn-preview {
            color: #6366f1;
            background: #eef2ff;
        }

        .btn-edit {
            color: #0ea5e9;
            background: #f0f9ff;
        }

        .btn-delete {
            color: #ef4444;
            background: #fef2f2;
        }

        /* Preview Modal */
        .preview-modal-content {
            background: white;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .preview-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background: #f8fafc;
        }

        /* Category Pills */
        .cat-pills {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 5px;
            margin-bottom: 20px;
            scrollbar-width: none;
        }

        .cat-pill {
            padding: 10px 20px;
            background: white;
            border-radius: 30px;
            cursor: pointer;
            white-space: nowrap;
            border: 1px solid #e2e8f0;
            font-weight: 700;
            color: #64748b;
            transition: all 0.3s ease;
        }

        .cat-pill.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* Checkbox Styles */
        .card-checkbox-container {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            background: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .prod-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .selected-card {
            border: 2px solid var(--primary-color) !important;
            background-color: #f0f9ff !important;
        }
    </style>
    <!-- SheetJS for Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>

<body>

    <main>
        <div class="page-header">
            <div>
                <h1 class="page-title"><i class="fa-solid fa-boxes-stacked"></i> إدارة المنتجات</h1>
                <p style="color:#64748b; margin-top:5px;">إضافة وتعديل ومراقبة مخزون المنتجات</p>
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="exportData()" class="btn btn-secondary"
                    style="background:#fff; border:1px solid #cbd5e1; color:#1e293b;">
                    <i class="fa-solid fa-file-export"></i> تصدير (Excel)
                </button>
                <button onclick="document.getElementById('import-file').click()" class="btn btn-secondary"
                    style="background:#fff; border:1px solid #cbd5e1; color:#1e293b;">
                    <i class="fa-solid fa-file-import"></i> استيراد (Excel)
                </button>
                <input type="file" id="import-file" style="display:none" accept=".xlsx, .xls, .csv"
                    onchange="importData(this)">

                <button onclick="importFromFeed()" class="btn btn-secondary"
                    style="background: linear-gradient(135deg, #e0f2fe, #ede9fe); border:1px solid #a5b4fc; color:#4f46e5; font-weight:800;">
                    <i class="fa-solid fa-cloud-arrow-down"></i> استيراد من المتجر
                </button>

                <button onclick="resetForm(); openProductModal()" class="btn btn-primary"
                    style="box-shadow: var(--shadow);">
                    <i class="fa-solid fa-plus-circle"></i> منتج جديد
                </button>
            </div>
        </div>

        <!-- Product Form Modal -->
        <div class="modal-overlay" id="product-modal">
            <div class="modal-content" style="max-width: 600px;">
                <div class="modal-header">
                    <h2 id="form-title" style="margin:0; font-size:1.3rem;">إضافة منتج جديد</h2>
                    <button onclick="closeProductModal()"
                        style="background:none; border:none; font-size:1.8rem; cursor:pointer; color:#94a3b8;">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="product-form" style="display: flex; flex-direction: column; gap: 1rem;">
                        <input type="hidden" id="prod-id"> <!-- For Edit Mode -->

                        <div class="form-group">
                            <label class="form-label">الاسم <i class="fa-solid fa-tag"></i></label>
                            <input type="text" id="p-name" class="form-input" required>
                        </div>

                        <div class="form-group">
                            <label>معرف المنتج (الكود)</label>
                            <input type="text" id="prod-id-manual" placeholder="مثلاً: SKU-100">
                        </div>

                        <div class="form-group">
                            <label>الباركود</label>
                            <input type="text" id="prod-barcode" placeholder="رقم الباركود (اختياري)">
                        </div>

                        <!-- Categories -->
                        <div class="form-group">
                            <label>التصنيف</label>
                            <div style="display:flex; gap:5px;">
                                <select id="prod-category" required style="width:100%"></select>
                                <button type="button" class="btn" onclick="addCustomCat()"
                                    style="padding:0 10px;">+</button>
                            </div>
                        </div>

                        <div class="row" style="display:flex; gap:10px;">
                            <div class="form-group" style="flex:1">
                                <label>سعر البيع</label>
                                <input type="number" id="prod-price" min="0" step="0.01" required>
                            </div>
                            <div class="form-group" style="flex:1">
                                <label>سعر التكلفة</label>
                                <input type="number" id="prod-cost" min="0" step="0.01" value="0">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>الكمية (Stock)</label>
                            <input type="number" id="prod-stock" min="0" value="1" required>
                        </div>

                        <div class="form-group">
                            <div class="col">
                                <label>صورة المنتج</label>
                                <!-- Image Input Tabs -->
                                <div style="display:flex; gap:10px; margin-bottom:10px;">
                                    <button type="button" onclick="switchImgInput('file')" id="btn-img-file"
                                        class="btn btn-sm" style="background:#e2e8f0;">رفع ملف</button>
                                    <button type="button" onclick="switchImgInput('url')" id="btn-img-url"
                                        class="btn btn-sm"
                                        style="background:transparent; border:1px solid #e2e8f0;">رابط خارجي</button>
                                </div>

                                <div id="img-input-file">
                                    <input type="file" id="prod-img" class="form-control" accept="image/*">
                                </div>
                                <div id="img-input-url" style="display:none;">
                                    <input type="url" id="prod-img-url" class="form-control"
                                        placeholder="https://example.com/image.jpg">
                                </div>
                            </div>
                        </div>

                        <div style="display:flex; gap:10px; margin-top: 1rem;">
                            <button type="submit" class="btn btn-primary" id="btn-submit"
                                style="height: 42px; flex:1;">+ حفظ المنتج</button>
                            <button type="button" class="btn" style="height: 42px; background:#94a3b8; color:white;"
                                onclick="closeProductModal()">إلغاء</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Products List Section -->
        <div style="margin-top: 2rem;">
            <div
                style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px; flex-wrap:wrap; gap:10px;">
                <h3 class="page-title" style="font-size:1.4rem; white-space:nowrap;">المخزون الحالي</h3>

                <!-- Search for Products -->
                <div class="filter-group">
                    <label class="filter-label">البحث عن منتج <i class="fa-solid fa-magnifying-glass"></i></label>
                    <input type="text" id="prod-search" class="filter-input" placeholder="اسم المنتج، تصنيف، ID..."
                        oninput="renderProducts()">
                </div>
            </div>

            <!-- Category Pills Container -->
            <div style="display:flex; align-items:center; gap:10px; overflow-x:auto;">
                <button onclick="toggleSelectAll()" class="btn btn-sm btn-secondary"
                    style="white-space:nowrap; height:40px;"><i class="fa-solid fa-check-double"></i> تحديد
                    الكل</button>
                <div class="cat-pills" id="category-pills" style="margin-bottom:0;">
                    <!-- Dynamic Pills -->
                </div>
            </div>
        </div>

        <div class="products-grid" id="products-container">
            <!-- Dynamic -->
        </div>

        <!-- Pagination Controls -->
        <div id="pagination-container"
            style="display:flex; justify-content:center; gap:8px; margin-top:30px; margin-bottom:50px; flex-wrap:wrap;">
            <!-- Dynamic Pagination Buttons -->
        </div>

        <!-- Preview Modal -->
        <div id="preview-modal" class="modal-overlay" onclick="closePreview(event)">
            <div class="preview-modal-content" onclick="event.stopPropagation()">
                <div id="preview-img-container"></div>
                <div style="padding: 2rem;">
                    <div
                        style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1rem;">
                        <div>
                            <span id="preview-cat" class="category-label"></span>
                            <h2 id="preview-title" style="margin: 5px 0; font-size:1.8rem;"></h2>
                        </div>
                        <div id="preview-price" class="price-tag"></div>
                    </div>

                    <div style="background:#f8fafc; padding:1.25rem; border-radius:12px; margin-bottom:1.5rem;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                            <span style="color:#64748b;">حالة المخزون</span>
                            <span id="preview-stock" style="font-weight:bold;"></span>
                        </div>
                        <div style="display:flex; justify-content:space-between;">
                            <span style="color:#64748b;">معرف المنتج</span>
                            <span id="preview-id" style="font-family:monospace; color:#94a3b8;"></span>
                        </div>
                    </div>

                    <button class="btn btn-primary" onclick="closePreview()" style="width:100%; padding:12px;">إغلاق
                        المعاينة</button>
                </div>
            </div>
        </div>

        <!-- Move Category Modal -->
        <div id="move-cat-modal" class="modal-overlay" onclick="closeMoveCategoryModal()">
            <div class="modal-content" style="max-width: 400px;" onclick="event.stopPropagation()">
                <div class="modal-header">
                    <h3 class="modal-title"><i class="fa-solid fa-folder-tree"></i> نقل إلى تصنيف...</h3>
                    <button class="modal-close" onclick="closeMoveCategoryModal()">✕</button>
                </div>
                <div class="modal-body">
                    <div id="move-cat-list"
                        style="display:flex; flex-direction:column; gap:10px; max-height:400px; overflow-y:auto; padding: 5px;">
                        <!-- Buttons injected here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Feed Import Modal -->
    <div id="feed-import-modal" class="modal-overlay" onclick="if(event.target===this) closeFeedModal()"
        style="display:none;">
        <div class="modal-content" style="max-width:700px; max-height:85vh; display:flex; flex-direction:column;">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fa-solid fa-cloud-arrow-down"></i> استيراد من المتجر الإلكتروني</h3>
                <button onclick="closeFeedModal()"
                    style="background:none; border:none; font-size:1.8rem; cursor:pointer; color:#94a3b8;">&times;</button>
            </div>
            <div id="feed-modal-body" style="padding:20px; overflow-y:auto; flex:1;">
                <div style="text-align:center; padding:40px; color:#94a3b8;">
                    <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                    <div style="margin-top:10px; font-weight:700;">جاري استيراد المنتجات...</div>
                </div>
            </div>
            <div class="modal-header" style="border-top:1px solid #f1f5f9; border-bottom:none; padding:15px 20px;">
                <div id="feed-count-info" style="color:#64748b; font-weight:700; font-size:0.9rem;"></div>
                <div style="display:flex; gap:10px;">
                    <button onclick="closeFeedModal()" class="btn"
                        style="background:#f1f5f9; color:#64748b;">إلغاء</button>
                    <button onclick="confirmFeedImport()" id="feed-confirm-btn" class="btn btn-primary" disabled>
                        <i class="fa-solid fa-download"></i> استيراد المحدد
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('products-container');
            const form = document.getElementById('product-form');
            const imgInput = document.getElementById('prod-img');
            const catSelect = document.getElementById('prod-category');
            const pillContainer = document.getElementById('category-pills');

            // Edit Mode Vars
            const prodIdInput = document.getElementById('prod-id');
            const submitBtn = document.getElementById('btn-submit');
            const formTitle = document.getElementById('form-title');
            const productModal = document.getElementById('product-modal');

            let activeFilter = 'ALL';
            let currentPage = 1;
            const itemsPerPage = 24;

            // Modal Controls
            window.openProductModal = () => {
                productModal.classList.add('active');
            };

            window.closeProductModal = () => {
                productModal.classList.remove('active');
            };

            // --- Categories ---
            window.loadCats = () => {
                const cats = store.getProductCategories();
                const currentVal = catSelect.value;
                catSelect.innerHTML = '';

                // Dropdown for Form
                cats.forEach(c => {
                    catSelect.innerHTML += `<option value="${c}">${c}</option>`;
                });
                if (currentVal) catSelect.value = currentVal;

                // Pills for Filtering
                pillContainer.innerHTML = '';

                // 'All' Pill
                const allPill = createPill('الكل', 'ALL');
                pillContainer.appendChild(allPill);

                cats.forEach(c => {
                    pillContainer.appendChild(createPill(c, c));
                });
            };

            function createPill(label, value) {
                const pill = document.createElement('div');
                pill.className = `cat-pill ${activeFilter === value ? 'active' : ''}`;
                pill.textContent = label;
                pill.onclick = () => {
                    activeFilter = value;
                    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                    renderProducts();
                };
                return pill;
            }

            window.addCustomCat = () => {
                const name = prompt('اسم التصنيف الجديد:');
                if (name) {
                    store.addProductCategory(name);
                    loadCats();
                    catSelect.value = name;
                }
            };

            window.renderProducts = () => {
                const products = store.getProducts();
                const catFilter = activeFilter;
                const searchTerm = document.getElementById('prod-search').value.toLowerCase();

                // Reset page if we are searching/filtering anew? 
                // Usually good, but let's see. 
                // To keep it simple, if searchTerm changes, we might want to reset to page 1.
                // But renderProducts is called on many things. 

                container.innerHTML = '';

                let filtered = products;

                // 1. Filter by Category
                if (catFilter !== 'ALL') {
                    filtered = filtered.filter(p => p.category === catFilter);
                }

                // 2. Filter by Search
                if (searchTerm) {
                    filtered = filtered.filter(p =>
                        p.name.toLowerCase().includes(searchTerm) ||
                        p.id.toString().toLowerCase().includes(searchTerm) ||
                        (p.barcode && p.barcode.toLowerCase().includes(searchTerm))
                    );
                }

                filtered.forEach(p => {
                    const isSelected = selectedIds.has(p.id);
                    const card = document.createElement('div');
                    card.className = `product-card ${isSelected ? 'selected-card' : ''}`;
                    // onclick select if selection mode? Or just view? let's keep view but allow checkbox click
                    card.onclick = (e) => {
                        // if clicked on checkbox or actions, don't view
                        if (e.target.tagName !== 'INPUT' && !e.target.closest('.card-actions')) viewProd(p.id);
                    };

                    const imgHtml = p.image
                        ? `<img src="${p.image}" class="product-img" alt="${p.name}">`
                        : `<div class="product-img default-img-text"><i class="fa-solid fa-image"></i></div>`;

                    const stock = p.stock || 0;
                    const isLow = stock < 10;
                    const stockClass = isLow ? 'stock-low' : '';
                    const stockText = isLow ? `<i class="fa-solid fa-triangle-exclamation"></i> منخفض (${stock})` : `متوفر (${stock})`;

                    card.innerHTML = `
                        <div class="card-checkbox-container">
                            <input type="checkbox" class="prod-checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelection('${p.id}')" onclick="event.stopPropagation()">
                        </div>
                        ${imgHtml}
                        <div class="product-info">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span class="category-label">${p.category || 'عام'}</span>
                                <span class="stock-badge-pill ${stockClass}">${stockText}</span>
                            </div>
                            <div style="display:flex; flex-direction:column; gap:2px;">
                                <h3 class="product-title">${p.name}</h3>
                                <small style="color:#94a3b8; font-family:monospace;">ID: ${p.id}</small>
                            </div>
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                                <span class="price-tag">${parseFloat(p.price).toLocaleString()} <small style="font-size:0.7rem;">₪</small></span>
                                <div class="card-actions">
                                    <button class="action-btn-mini btn-preview" title="معاينة" onclick='event.stopPropagation(); viewProd("${p.id}")'><i class="fa-solid fa-eye"></i></button>
                                    <button class="action-btn-mini btn-edit" title="تعديل" onclick='event.stopPropagation(); editProd("${p.id}")'><i class="fa-solid fa-pen-to-square"></i></button>
                                    <button class="action-btn-mini btn-delete" title="حذف" onclick="event.stopPropagation(); deleteProd('${p.id}')"><i class="fa-solid fa-trash-can"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

                if (filtered.length === 0) container.innerHTML = '<div style="text-align:center; grid-column:1/-1; padding:40px; color:#94a3b8;"><i class="fa-solid fa-inbox"></i> لا يوجد منتجات في هذا التصنيف</div>';

                // Pagination Logic
                const totalItems = filtered.length;
                const totalPages = Math.ceil(totalItems / itemsPerPage);

                if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
                if (currentPage < 1) currentPage = 1;

                const startIdx = (currentPage - 1) * itemsPerPage;
                const paginatedItems = filtered.slice(startIdx, startIdx + itemsPerPage);

                // Clear and render only paginated items
                container.innerHTML = '';
                if (paginatedItems.length === 0 && totalItems > 0) {
                    currentPage = 1;
                    renderProducts();
                    return;
                }

                paginatedItems.forEach(p => {
                    const isSelected = selectedIds.has(p.id);
                    const card = document.createElement('div');
                    card.className = `product-card ${isSelected ? 'selected-card' : ''}`;
                    card.onclick = (e) => {
                        if (e.target.tagName !== 'INPUT' && !e.target.closest('.card-actions')) viewProd(p.id);
                    };

                    const imgHtml = p.image
                        ? `<img src="${p.image}" class="product-img" alt="${p.name}">`
                        : `<div class="product-img default-img-text"><i class="fa-solid fa-image"></i></div>`;

                    const stock = p.stock || 0;
                    const isLow = stock < 10;
                    const stockClass = isLow ? 'stock-low' : '';
                    const stockText = isLow ? `<i class="fa-solid fa-triangle-exclamation"></i> منخفض (${stock})` : `متوفر (${stock})`;

                    card.innerHTML = `
                        <div class="card-checkbox-container">
                            <input type="checkbox" class="prod-checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelection('${p.id}')" onclick="event.stopPropagation()">
                        </div>
                        ${imgHtml}
                        <div class="product-info">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span class="category-label">${p.category || 'عام'}</span>
                                <span class="stock-badge-pill ${stockClass}">${stockText}</span>
                            </div>
                            <div style="display:flex; flex-direction:column; gap:2px;">
                                <h3 class="product-title">${p.name}</h3>
                                <small style="color:#94a3b8; font-family:monospace;">ID: ${p.id}</small>
                            </div>
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                                <span class="price-tag">${parseFloat(p.price).toLocaleString()} <small style="font-size:0.7rem;">₪</small></span>
                                <div class="card-actions">
                                    <button class="action-btn-mini btn-preview" title="معاينة" onclick='event.stopPropagation(); viewProd("${p.id}")'><i class="fa-solid fa-eye"></i></button>
                                    <button class="action-btn-mini btn-edit" title="تعديل" onclick='event.stopPropagation(); editProd("${p.id}")'><i class="fa-solid fa-pen-to-square"></i></button>
                                    <button class="action-btn-mini btn-delete" title="حذف" onclick="event.stopPropagation(); deleteProd('${p.id}')"><i class="fa-solid fa-trash-can"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

                if (paginatedItems.length === 0) container.innerHTML = '<div style="text-align:center; grid-column:1/-1; padding:40px; color:#94a3b8;"><i class="fa-solid fa-inbox"></i> لا يوجد منتجات مطابقة</div>';

                renderPagination(totalPages);
                updateBulkToolbar();
            };

            function renderPagination(totalPages) {
                const pagContainer = document.getElementById('pagination-container');
                pagContainer.innerHTML = '';
                if (totalPages <= 1) return;

                // Prev Button
                const prevBtn = document.createElement('button');
                prevBtn.className = 'btn btn-secondary';
                prevBtn.style.padding = '8px 15px';
                prevBtn.innerHTML = '<i class="fa-solid fa-chevron-right"></i>'; // RTL
                prevBtn.disabled = currentPage === 1;
                prevBtn.onclick = () => { currentPage--; renderProducts(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
                pagContainer.appendChild(prevBtn);

                // Page Numbers (Smart Pagination)
                let startPage = Math.max(1, currentPage - 2);
                let endPage = Math.min(totalPages, startPage + 4);
                if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

                for (let i = startPage; i <= endPage; i++) {
                    const btn = document.createElement('button');
                    btn.className = i === currentPage ? 'btn btn-primary' : 'btn btn-secondary';
                    btn.style.padding = '8px 15px';
                    btn.style.minWidth = '45px';
                    btn.textContent = i;
                    btn.onclick = () => { currentPage = i; renderProducts(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
                    pagContainer.appendChild(btn);
                }

                // Next Button
                const nextBtn = document.createElement('button');
                nextBtn.className = 'btn btn-secondary';
                nextBtn.style.padding = '8px 15px';
                nextBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>'; // RTL
                nextBtn.disabled = currentPage === totalPages;
                nextBtn.onclick = () => { currentPage++; renderProducts(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
                pagContainer.appendChild(nextBtn);
            }

            // Bulk Selection Logic
            let selectedIds = new Set();

            window.toggleSelection = (id) => {
                if (selectedIds.has(id)) selectedIds.delete(id);
                else selectedIds.add(id);
                renderProducts(); // Re-render to update UI state
            };

            window.toggleSelectAll = () => {
                const products = store.getProducts();
                const catFilter = activeFilter;
                const filtered = catFilter === 'ALL' ? products : products.filter(p => p.category === catFilter);

                const allSelected = filtered.every(p => selectedIds.has(p.id));

                if (allSelected) {
                    filtered.forEach(p => selectedIds.delete(p.id));
                } else {
                    filtered.forEach(p => selectedIds.add(p.id));
                }
                renderProducts();
            };

            window.deleteSelected = () => {
                if (selectedIds.size === 0) return;

                UI.confirm(`هل أنت متأكد من حذف ${selectedIds.size} منتج؟`, 'حذف متعدد', () => {
                    selectedIds.forEach(id => store.deleteProduct(id));
                    selectedIds.clear();
                    renderProducts();
                    alert('تم الحذف بنجاح');
                });
            };

            window.bulkMoveCategory = () => {
                if (selectedIds.size === 0) return;

                const modal = document.getElementById('move-cat-modal');
                const list = document.getElementById('move-cat-list');
                const cats = store.getProductCategories();

                list.innerHTML = '';

                cats.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.style.cssText = 'text-align:right; justify-content:flex-start; padding:12px; border:1px solid #e2e8f0; background:white; color:#334155; transition:all 0.2s;';
                    btn.innerHTML = `<span style="margin-left:8px;"><i class="fa-solid fa-folder"></i></span> <strong>${cat}</strong>`;

                    btn.onmouseover = () => { btn.style.background = '#f1f5f9'; btn.style.transform = 'translateX(-5px)'; };
                    btn.onmouseout = () => { btn.style.background = 'white'; btn.style.transform = 'none'; };

                    btn.onclick = () => performMove(cat);
                    list.appendChild(btn);
                });

                // Add New Option
                const btnNew = document.createElement('button');
                btnNew.className = 'btn btn-primary';
                btnNew.style.cssText = 'margin-top:10px; padding:12px; justify-content:center;';
                btnNew.innerHTML = '<i class="fa-solid fa-plus"></i> تصنيف جديد...';
                btnNew.onclick = () => {
                    list.innerHTML = `
                        <div style="padding:5px;">
                            <label style="display:block; margin-bottom:8px; font-weight:bold;">اسم التصنيف الجديد:</label>
                            <input type="text" id="new-cat-input" placeholder="أدخل الاسم..." 
                                style="width:100%; padding:12px; margin-bottom:12px; border:2px solid #e2e8f0; border-radius:10px; font-family:inherit;">
                            <div style="display:flex; gap:10px;">
                                <button id="btn-confirm-move" class="btn btn-primary" style="flex:1; justify-content:center;"><i class="fa-solid fa-check"></i> إنشاء ونقل</button>
                                <button id="btn-cancel-move" class="btn btn-secondary" style="background:#f1f5f9; color:#64748b;">إلغاء</button>
                            </div>
                        </div>
                   `;
                    const input = document.getElementById('new-cat-input');
                    input.focus();

                    document.getElementById('btn-confirm-move').onclick = () => {
                        const newName = input.value;
                        if (newName && newName.trim()) performMove(newName);
                    };

                    document.getElementById('btn-cancel-move').onclick = () => {
                        // Re-render list
                        bulkMoveCategory();
                    };
                };
                list.appendChild(btnNew);

                modal.classList.add('active');
            };

            window.closeMoveCategoryModal = () => {
                document.getElementById('move-cat-modal').classList.remove('active');
            };

            const performMove = (targetCat) => {
                let count = 0;
                targetCat = targetCat.trim();
                selectedIds.forEach(id => {
                    const p = store.getProducts().find(x => x.id === id);
                    if (p) {
                        p.category = targetCat;
                        store.updateProduct(p.id, p);
                        count++;
                    }
                });

                store.addProductCategory(targetCat);
                selectedIds.clear();
                loadCats();
                renderProducts();
                closeMoveCategoryModal();
                // alert(`تم نقل ${count} منتج إلى التصنيف "${targetCat}"`);
                // Use a toast or just refresh? User sees result immediately if filter is ALL or specific.
                // If filter is specific and they moved OUT, items disappear. Good.
            };

            window.clearSelection = () => {
                selectedIds.clear();
                renderProducts();
            };

            function updateBulkToolbar() {
                let toolbar = document.getElementById('bulk-toolbar');
                if (!toolbar) {
                    // Create toolbar if not exists
                    const header = document.querySelector('.page-header');
                    toolbar = document.createElement('div');
                    toolbar.id = 'bulk-toolbar';
                    toolbar.style.cssText = `
                        background: #fdf2f2; 
                        border: 1px solid #fca5a5; 
                        color: #991b1b;
                        padding: 10px 20px; 
                        border-radius: 8px; 
                        display: none; 
                        align-items: center; 
                        gap: 15px; 
                        margin-top: 10px;
                        animation: fadeIn 0.3s ease;
                    `;
                    header.after(toolbar);
                }

                if (selectedIds.size > 0) {
                    toolbar.style.display = 'flex';
                    toolbar.innerHTML = `
                        <strong>تم تحديد ${selectedIds.size} منتج</strong>
                        <div style="display:flex; gap:10px;">
                            <button onclick="bulkMoveCategory()" class="btn btn-sm" style="background:#f59e0b; color:white; border:none;"><i class="fa-solid fa-folder-tree"></i> نقل التصنيف</button>
                            <button onclick="deleteSelected()" class="btn btn-sm" style="background:#ef4444; color:white; border:none;"><i class="fa-solid fa-trash-can"></i> حذف المحدد</button>
                            <button onclick="clearSelection()" class="btn btn-sm" style="background:transparent; border:1px solid #991b1b; color:#991b1b;">إلغاء التحديد</button>
                        </div>
                    `;
                } else {
                    toolbar.style.display = 'none';
                }
            }

            window.viewProd = (id) => {
                try {
                    const products = store.getProducts();
                    const p = products.find(x => x.id == id);
                    if (!p) return;

                    const modal = document.getElementById('preview-modal');
                    const imgCont = document.getElementById('preview-img-container');

                    imgCont.innerHTML = p.image
                        ? `<img src="${p.image}" class="preview-img">`
                        : `<div class="preview-img default-img-text"><i class="fa-solid fa-box"></i></div>`;

                    document.getElementById('preview-title').textContent = p.name;
                    document.getElementById('preview-cat').textContent = (p.category || 'عام') + ` | ${p.id}`;
                    document.getElementById('preview-price').textContent = parseFloat(p.price).toLocaleString() + ' ₪';
                    document.getElementById('preview-stock').textContent = p.stock + ' قطعة';
                    document.getElementById('preview-id').textContent = p.id;

                    modal.classList.add('active');
                } catch (err) {
                    console.error(err);
                    alert('حدث خطأ أثناء عرض المنتج');
                }
            };

            window.closePreview = () => {
                document.getElementById('preview-modal').classList.remove('active');
            };

            // --- Actions ---
            window.deleteProd = (id) => {
                UI.confirm('حذف المنتج؟', 'حذف منتج', () => {
                    store.deleteProduct(id);
                    renderProducts();
                });
            };

            window.editProd = (id) => {
                try {
                    resetForm();
                    const products = store.getProducts();
                    const prod = products.find(x => x.id == id);
                    if (!prod) {
                        UI.toast('المنتج غير موجود', 'danger');
                        return;
                    }

                    // Populate Form
                    prodIdInput.value = prod.id;
                    document.getElementById('prod-name').value = prod.name;

                    const mId = document.getElementById('prod-id-manual');
                    if (mId) mId.value = prod.id;

                    document.getElementById('prod-price').value = prod.price;
                    document.getElementById('prod-cost').value = prod.cost || 0;
                    document.getElementById('prod-stock').value = prod.stock || 0;
                    document.getElementById('prod-barcode').value = prod.barcode || '';
                    catSelect.value = prod.category || 'عام';

                    // Image Handling
                    if (prod.image && prod.image.startsWith('http')) {
                        switchImgInput('url');
                        document.getElementById('prod-img-url').value = prod.image;
                    } else {
                        switchImgInput('file');
                        // Cannot set file input value, but we can reset URL
                        document.getElementById('prod-img-url').value = '';
                    }

                    // UI Change
                    formTitle.textContent = 'تعديل المنتج: ' + prod.name;
                    submitBtn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> حفظ التعديلات';
                    submitBtn.classList.remove('btn-primary');
                    submitBtn.classList.add('btn-success');

                    openProductModal();
                } catch (err) {
                    console.error(err);
                    UI.toast('حدث خطأ أثناء فتح التعديل: ' + err.message, 'danger');
                }
            };

            window.resetForm = () => {
                form.reset();
                prodIdInput.value = '';
                document.getElementById('prod-id-manual').value = '';
                document.getElementById('prod-id-manual').disabled = false;
                formTitle.textContent = 'إضافة منتج جديد';
                submitBtn.textContent = '+ حفظ المنتج';
                submitBtn.classList.add('btn-primary');
                submitBtn.classList.remove('btn-success');
                loadCats(); // Reset cat select
                // Reset Image UI
                switchImgInput('file');
            };

            // Image Input Toggle
            window.switchImgInput = (type) => {
                const fileDiv = document.getElementById('img-input-file');
                const urlDiv = document.getElementById('img-input-url');
                const btnFile = document.getElementById('btn-img-file');
                const btnUrl = document.getElementById('btn-img-url');

                if (type === 'file') {
                    fileDiv.style.display = 'block';
                    urlDiv.style.display = 'none';
                    btnFile.style.background = '#e2e8f0';
                    btnUrl.style.background = 'transparent';
                } else {
                    fileDiv.style.display = 'none';
                    urlDiv.style.display = 'block';
                    btnFile.style.background = 'transparent';
                    btnUrl.style.background = '#e2e8f0';
                }
            };

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const id = prodIdInput.value; // manual ID input (hidden or visible) logic - wait, we used hidden before?
                // Actually the ID might be generated or edited. checking usage:
                const manualId = document.getElementById('prod-id-manual').value;
                const name = document.getElementById('prod-name').value;
                const price = document.getElementById('prod-price').value;
                const cost = document.getElementById('prod-cost').value;
                const stock = document.getElementById('prod-stock').value;
                const category = catSelect.value;
                const barcode = document.getElementById('prod-barcode').value; // Optional
                const file = imgInput.files[0];
                const url = document.getElementById('prod-img-url').value;

                const saveData = (img) => {
                    const data = {
                        name,
                        price: parseFloat(price),
                        cost: parseFloat(cost),
                        stock: parseInt(stock),
                        category,
                        barcode: barcode || ''
                    };

                    // ID Logic
                    // If editing (id exists in hidden input? No we rely on closure 'id' var?? No, look at code above 'const id = ...')
                    // The 'id' var comes from 'prodIdInput.value'. 
                    // If we have an ID, it's an update.

                    if (id) {
                        data.id = id;
                        // If user provided manual ID and it's different? usually forbidden but let's stick to update

                        // Image Logic for Update
                        if (img) data.image = img; // New image (File or URL)
                        else if (!file && !url && img === null) {
                            // No new file, no new URL, but img passed as null? 
                            // Actually saveData(null) is called if no file/url.
                            // If user explicitly CLEARED image? simpler:
                            // If no new image provided, don't update key to keep old one.
                            delete data.image;
                        }

                        // Wait, if switching from File to URL or vice versa? 
                        // If 'img' is present, use it.

                        store.updateProduct(id, data);
                        UI.toast('تم حفظ التعديلات بنجاح <i class="fa-solid fa-check"></i>');
                    } else {
                        // Create New
                        data.id = manualId || Date.now().toString(36);
                        data.image = img || '';
                        store.addProduct(data);
                    }
                    closeProductModal();
                    renderProducts();
                };

                if (file) {
                    const reader = new FileReader();
                    reader.onload = (evt) => saveData(evt.target.result);
                    reader.readAsDataURL(file);
                } else if (url && url.trim() !== '') {
                    saveData(url.trim());
                } else {
                    saveData(null);
                }
            });

            loadCats();
            renderProducts();

            // Search Listener
            document.getElementById('prod-search').addEventListener('input', () => {
                currentPage = 1; // Reset to page 1 on search
                renderProducts();
            });

            // Export to Excel
            window.exportData = () => {
                try {
                    if (typeof XLSX === 'undefined') {
                        alert('خطأ: مكتبة Excel لم يتم تحميلها. تأكد من اتصال الإنترنت وتحديث الصفحة.');
                        return;
                    }

                    let skippedImages = 0;
                    const products = store.getProducts().map(p => {
                        let imgVal = p.image || '';
                        // Excel cell limit is 32767 chars. Base64 images are often larger.
                        if (imgVal.length > 32000) {
                            imgVal = ''; // Skip large embedded images
                            skippedImages++;
                        }
                        return {
                            'المعرف': p.id,
                            'اسم المنتج': p.name,
                            'السعر': p.price,
                            'سعر التكلفة': p.cost || 0,
                            'الكمية': p.stock,
                            'التصنيف': p.category,
                            'الباركود': p.barcode || '',
                            'الوصف': p.description || '',
                            'رابط الصورة': imgVal
                        };
                    });

                    const ws = XLSX.utils.json_to_sheet(products, {
                        header: [
                            'المعرف', 'اسم المنتج', 'السعر', 'سعر التكلفة',
                            'الكمية', 'التصنيف', 'الباركود', 'الوصف', 'رابط الصورة'
                        ]
                    });
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "المنتجات");
                    XLSX.writeFile(wb, "products_inventory.xlsx");

                    if (skippedImages > 0) {
                        alert(`تم التصدير بنجاح، ولكن تم تجاوز ${skippedImages} صورة لأن حجمها كبير جداً (صور مرفوعة) ولا يمكن وضعها في Excel. الروابط الخارجية فقط تعمل بشكل مثالي.`);
                    }
                } catch (err) {
                    alert('حدث خطأ أثناء التصدير: ' + err.message);
                    console.error(err);
                }
            };

            // Import from Excel
            window.importData = (input) => {
                const file = input.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet);

                    let count = 0;
                    jsonData.forEach(row => {
                        // Map Arabic headers back to keys if used, or English keys
                        // Trying to be smart about flexible inputs
                        const name = row['اسم المنتج'] || row['name'] || row['Name'];
                        const price = row['السعر'] || row['price'] || row['Price'];
                        const stock = row['الكمية'] || row['stock'] || row['quantity'];

                        if (name && price) {
                            const imgVal = row['رابط الصورة'] || row['image'] || row['Image'] || '';

                            store.addProduct({
                                name: name,
                                price: parseFloat(price),
                                cost: parseFloat(row['سعر التكلفة'] || row['cost'] || 0),
                                stock: parseInt(stock || 0),
                                category: row['التصنيف'] || row['category'] || 'عام',
                                barcode: row['الباركود'] || row['barcode'] || '',
                                description: row['الوصف'] || row['description'] || '',
                                image: imgVal
                            });
                            count++;
                        }
                    });

                    alert(`تم استيراد ${count} منتج بنجاح ✅`);
                    renderProducts();
                    input.value = ''; // Reset
                };
                reader.readAsArrayBuffer(file);
            };
        });

        // =====================================================================
        // PRODUCT FEED IMPORT
        // =====================================================================
        const DEFAULT_FEED_URL = '';
        let feedItems = [];

        window.importFromFeed = () => {
            const modal = document.getElementById('feed-import-modal');
            const body = document.getElementById('feed-modal-body');
            const countInfo = document.getElementById('feed-count-info');
            const confirmBtn = document.getElementById('feed-confirm-btn');

            // Step 1: Ask for URL
            body.innerHTML = `
                <div style="padding:10px 0;">
                    <label style="font-weight:800; color:#1e293b; display:block; margin-bottom:10px;">
                        <i class="fa-solid fa-link"></i> رابط الـ Product Feed (RSS/XML)
                    </label>
                    <input type="url" id="feed-url-input" placeholder="https://api.easy-orders.net/..."
                        value="${DEFAULT_FEED_URL}"
                        style="width:100%; padding:12px 15px; border:2px solid #c7d2fe; border-radius:12px;
                               font-family:inherit; font-size:0.95rem; direction:ltr; color:#1e293b;
                               outline:none; transition:border 0.2s;"
                        onfocus="this.style.borderColor='#4f46e5'"
                        onblur="this.style.borderColor='#c7d2fe'"
                        onkeydown="if(event.key==='Enter') fetchFeed()">
                    <p style="margin-top:8px; color:#94a3b8; font-size:0.82rem;">
                        مثال: رابط Meta Catalog Feed من easy-orders أو أي RSS مدعوم من Google Merchant
                    </p>
                </div>
            `;
            countInfo.textContent = '';
            confirmBtn.disabled = false;
            confirmBtn.onclick = fetchFeed;
            confirmBtn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> جلب المنتجات';

            modal.style.display = 'flex';
            setTimeout(() => { modal.classList.add('active'); document.getElementById('feed-url-input')?.focus(); }, 10);
        };

        async function fetchFeed() {
            const urlInput = document.getElementById('feed-url-input');
            const feedUrl = urlInput?.value?.trim();
            if (!feedUrl) { UI.toast('الرجاء إدخال رابط الـ Feed أولاً', 'warning'); return; }

            const body = document.getElementById('feed-modal-body');
            const confirmBtn = document.getElementById('feed-confirm-btn');
            confirmBtn.disabled = true;

            body.innerHTML = `<div style="text-align:center; padding:40px; color:#94a3b8;">
                <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                <div style="margin-top:10px; font-weight:700;">جاري تحميل المنتجات من المتجر...</div>
            </div>`;

            try {
                let xmlText = '';

                // Try allorigins proxy (returns JSON with .contents field)
                try {
                    const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(feedUrl);
                    const response = await fetch(proxyUrl);
                    if (!response.ok) throw new Error('proxy error');
                    const json = await response.json();
                    xmlText = json.contents;
                } catch (e) {
                    // Fallback: try direct fetch (works if no CORS restriction)
                    const response = await fetch(feedUrl);
                    if (!response.ok) throw new Error('فشل تحميل الـ Feed: ' + response.status);
                    xmlText = await response.text();
                }

                if (!xmlText) throw new Error('لم يتم استلام بيانات من الـ Feed');
                const parser = new DOMParser();
                const xml = parser.parseFromString(xmlText, 'application/xml');
                const items = xml.querySelectorAll('item');
                if (items.length === 0) throw new Error('لم يتم العثور على منتجات في الـ Feed');

                const g = 'http://base.google.com/ns/1.0';
                const existingNames = new Set(store.getProducts().map(p => p.name.trim().toLowerCase()));

                feedItems = Array.from(items).map(item => {
                    const name = item.querySelector('title')?.textContent?.trim() || '';
                    const desc = item.querySelector('description')?.textContent?.trim() || '';
                    const image = item.getElementsByTagNameNS(g, 'image_link')[0]?.textContent?.trim() || '';
                    const priceRaw = item.getElementsByTagNameNS(g, 'sale_price')[0]?.textContent
                        || item.getElementsByTagNameNS(g, 'price')[0]?.textContent || '0';
                    const price = parseFloat(priceRaw) || 0;
                    const isExisting = existingNames.has(name.toLowerCase());
                    return { name, desc, image, price, isExisting, selected: !isExisting };
                });

                body.innerHTML = `
                    <div style="margin-bottom:12px; padding:10px; background:#f8fafc; border-radius:10px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
                        <button onclick="feedSelectAll(true)" class="btn btn-sm" style="background:#4f46e5; color:white; border:none; padding:6px 14px;">
                            <i class="fa-solid fa-check-double"></i> تحديد الكل
                        </button>
                        <button onclick="feedSelectAll(false)" class="btn btn-sm" style="background:#f1f5f9; color:#64748b; border:none; padding:6px 14px;">إلغاء الكل</button>
                        <span style="color:#94a3b8; font-size:0.85rem;">${feedItems.filter(i => i.isExisting).length} منتج موجود مسبقاً</span>
                    </div>
                    <div id="feed-items-list" style="display:flex; flex-direction:column; gap:10px;">
                        ${feedItems.map((item, idx) => `
                        <label style="display:flex; align-items:center; gap:12px; padding:12px; border-radius:12px; cursor:pointer;
                            background:${item.isExisting ? '#f8fafc' : '#fff'}; border:1px solid ${item.isExisting ? '#e2e8f0' : '#c7d2fe'};
                            opacity:${item.isExisting ? '0.7' : '1'}; transition:all 0.2s;"
                            onmouseover="this.style.background='#f0f9ff'" onmouseout="this.style.background='${item.isExisting ? '#f8fafc' : '#fff'}'">
                            <input type="checkbox" id="fi-${idx}" ${item.selected ? 'checked' : ''}
                                onchange="feedItems[${idx}].selected=this.checked; updateFeedCount();"
                                style="width:18px; height:18px; cursor:pointer; flex-shrink:0;">
                            <img src="${item.image}" onerror="this.style.display='none'"
                                style="width:50px; height:50px; border-radius:8px; object-fit:cover; background:#f1f5f9; flex-shrink:0;">
                            <div style="flex:1; min-width:0;">
                                <div style="font-weight:800; color:#1e293b; font-size:0.95rem;">${item.name}</div>
                                <div style="color:#64748b; font-size:0.8rem; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.desc || '—'}</div>
                            </div>
                            <span style="font-weight:900; color:#4f46e5; white-space:nowrap;">${item.price.toLocaleString()} ₪</span>
                            ${item.isExisting ? '<span style="font-size:0.75rem; background:#e2e8f0; color:#64748b; padding:2px 8px; border-radius:20px; flex-shrink:0;">موجود</span>' : ''}
                        </label>`).join('')}
                    </div>
                `;

                confirmBtn.innerHTML = '<i class="fa-solid fa-download"></i> استيراد المحدد';
                confirmBtn.onclick = confirmFeedImport;
                updateFeedCount();
            } catch (err) {
                console.error(err);
                body.innerHTML = `<div style="text-align:center; padding:40px; color:#ef4444;">
                    <i class="fa-solid fa-circle-xmark fa-2x"></i>
                    <div style="margin-top:10px; font-weight:700;">${err.message}</div>
                    <div style="margin-top:8px;">
                        <button onclick="importFromFeed()" class="btn btn-sm" style="background:#f1f5f9; color:#64748b;">
                            <i class="fa-solid fa-rotate-left"></i> حاول مجدداً
                        </button>
                    </div>
                </div>`;
            }
        }



        window.feedSelectAll = (checked) => {
            feedItems.forEach((item, idx) => {
                item.selected = checked;
                const cb = document.getElementById('fi-' + idx);
                if (cb) cb.checked = checked;
            });
            updateFeedCount();
        };

        function updateFeedCount() {
            const selected = feedItems.filter(i => i.selected).length;
            document.getElementById('feed-count-info').textContent = `${selected} منتج محدد للاستيراد من أصل ${feedItems.length}`;
            document.getElementById('feed-confirm-btn').disabled = selected === 0;
        }

        window.closeFeedModal = () => {
            const modal = document.getElementById('feed-import-modal');
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        };

        window.confirmFeedImport = () => {
            const toImport = feedItems.filter(i => i.selected);
            if (toImport.length === 0) return;

            let count = 0;
            toImport.forEach(item => {
                store.addProduct({
                    name: item.name,
                    price: item.price,
                    cost: 0,
                    stock: 1,
                    category: 'مجوهرات',
                    description: item.desc,
                    image: item.image
                });
                count++;
            });

            closeFeedModal();
            renderProducts();
            loadCats();
            UI.toast(`✅ تم استيراد ${count} منتج من المتجر بنجاح!`, 'success');
        };
    </script>

</body>

</html>
