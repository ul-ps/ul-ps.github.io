<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الطلبات | المحاسب الذكي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        .order-filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            background: white;
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 2rem;
            align-items: end;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .status-active {
            background: #dcfce7;
            color: #16a34a;
        }

        .status-scheduled {
            background: #fef3c7;
            color: #d97706;
        }

        .status-returned {
            background: #f1f5f9;
            color: #475569;
            border: 1px dashed #cbd5e1;
        }

        .status-cancelled {
            background: #fee2e2;
            color: #dc2626;
        }

        .ord-items-list {
            font-size: 0.85rem;
            color: #666;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .actions-cell {
            display: flex;
            gap: 8px;
            justify-content: flex-start;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .summary-card {
            background: white;
            padding: 1.2rem;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            text-align: center;
            border-bottom: 4px solid transparent;
        }

        .summary-card.scheduled {
            border-color: #f59e0b;
        }

        .summary-card.active {
            border-color: #10b981;
        }

        .summary-card .val {
            font-size: 1.5rem;
            font-weight: 900;
            color: #333;
            margin-top: 5px;
        }

        .summary-card .lbl {
            font-size: 0.9rem;
            color: #888;
        }

        /* Status colors for Delivery */
        .status-delivery {
            background: #e0f2fe;
            color: #0369a1;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
        }

        .detail-section {
            margin-bottom: 20px;
        }

        .detail-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .detail-row .lbl {
            color: #64748b;
        }

        .detail-row .val {
            font-weight: 700;
            color: #1e293b;
        }

        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .items-table th {
            text-align: right;
            background: #f8fafc;
            padding: 10px;
            font-size: 0.85rem;
            color: #64748b;
        }

        .items-table td {
            padding: 10px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
        }

        .item-thumb {
            width: 45px;
            height: 45px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
        }

        .item-thumb-placeholder {
            width: 45px;
            height: 45px;
            background: #f1f5f9;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #94a3b8;
        }

        /* Mobile Responsive Fixes */
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
                padding: 10px;
            }

            .summary-cards {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 8px;
                padding: 0 10px;
            }

            .summary-card {
                padding: 10px;
                min-width: 0;
            }

            .summary-card .val {
                font-size: 1.1rem;
                word-break: break-all;
            }

            .summary-card .lbl {
                font-size: 0.75rem;
            }

            .order-filters {
                grid-template-columns: 1fr;
                padding: 12px;
                margin: 0 10px 20px 10px;
                gap: 10px;
            }

            .table-container {
                padding: 0 10px;
                background: transparent;
                box-shadow: none;
            }

            table,
            thead,
            tbody {
                display: block;
                width: 100%;
            }

            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }

            tbody {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px;
            }

            tr {
                display: flex;
                flex-direction: column;
                background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
                border-radius: 20px;
                padding: 15px;
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
                border: 2px solid transparent;
                background-clip: padding-box;
                position: relative;
                transition: all 0.3s ease;
            }

            tr::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                border-radius: 18px;
                padding: 2px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                -webkit-mask-composite: xor;
                mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                mask-composite: exclude;
                opacity: 0;
                transition: opacity 0.3s ease;
            }

            tr:hover::before {
                opacity: 1;
            }

            tr:hover {
                transform: translateY(-4px);
                box-shadow: 0 12px 30px rgba(102, 126, 234, 0.2);
            }

            th,
            td {
                display: block;
                width: 100%;
                text-align: right;
            }

            td {
                border: none;
                padding: 6px 0;
                font-size: 0.85rem;
                position: relative;
            }

            td::before {
                content: attr(data-label);
                display: block;
                font-weight: 800;
                color: #667eea;
                font-size: 0.7rem;
                margin-bottom: 3px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .ord-items-list {
                max-width: 100% !important;
                white-space: normal;
                word-break: break-word;
                text-align: right;
                font-size: 0.8rem;
                line-height: 1.4;
            }

            .actions-cell {
                display: flex;
                justify-content: center;
                gap: 6px;
                padding-top: 12px;
                border-top: 2px dashed #e2e8f0;
                margin-top: 10px;
                flex-wrap: wrap;
            }

            .actions-cell::before {
                display: none;
            }

            .actions-cell button {
                flex: 1;
                min-width: 0;
                font-size: 0.75rem;
                padding: 6px 8px;
            }
        }

        html,
        body {
            overflow-x: hidden !important;
            max-width: 100vw;
        }

        .page-header {
            max-width: 100vw;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <main>
        <div class="page-header">
            <h1 class="page-title"><i class="fa-solid fa-file-invoice"></i> سجل الطلبات</h1>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-secondary" onclick="exportToExcel()"><i class="fa-solid fa-file-excel"></i> تصدير إكسل</button>
                <button class="btn btn-primary" onclick="renderOrders()"><i class="fa-solid fa-rotate"></i> تحديث</button>
            </div>
        </div>

        <!-- Summary Stats -->
        <div class="summary-cards">
            <div class="summary-card active">
                <div class="lbl"><i class="fa-solid fa-circle-check"></i> طلبات مكتملة</div>
                <div class="val" id="stat-completed">0</div>
            </div>
            <div class="summary-card delivery" style="border-color: #0ea5e9;">
                <div class="lbl"><i class="fa-solid fa-truck"></i> طرود قيد التوصيل</div>
                <div class="val" id="stat-delivery">0</div>
            </div>
            <div class="summary-card scheduled">
                <div class="lbl"><i class="fa-solid fa-calendar-day"></i> طلبات مؤجلة</div>
                <div class="val" id="stat-scheduled">0</div>
            </div>
            <div class="summary-card" style="border-color: #475569;">
                <div class="lbl"><i class="fa-solid fa-rotate-left"></i> إجمالي المرتجعات</div>
                <div class="val" id="stat-returned">0</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="order-filters">
            <div class="filter-group">
                <label class="filter-label">البحث عن طلب <i class="fa-solid fa-magnifying-glass"></i></label>
                <input type="text" id="order-search" class="filter-input" placeholder="رقم الطلب، اسم العميل...">
            </div>
            <div class="filter-group">
                <label class="filter-label">الحالة <i class="fa-solid fa-filter"></i></label>
                <select id="status-filter" class="filter-input">
                    <option value="ALL">الكل</option>
                    <option value="COMPLETED">مكتمل</option>
                    <option value="SCHEDULED">مؤجل (Scheduled)</option>
                    <option value="IN_DELIVERY">قيد التوصيل (In Delivery)</option>
                    <option value="RETURNED">مرتجع</option>
                    <option value="CANCELLED">ملغي</option>
                </select>
            </div>
            <div class="filter-group">
                <label>من تاريخ</label>
                <input type="date" id="date-from" class="filter-control">
            </div>
            <div class="filter-group">
                <label>إلى تاريخ</label>
                <input type="date" id="date-to" class="filter-control">
            </div>
            <div style="display:flex; gap:8px;">
                <button class="btn btn-secondary" onclick="resetFilters()" style="height: 42px; flex:1;"><i class="fa-solid fa-rotate-right"></i>
                    ريست</button>
                <button class="btn btn-secondary" onclick="exportToExcel()" style="height: 42px; flex:1;"><i class="fa-solid fa-file-excel"></i> تصدير
                    إكسل</button>
                <button class="btn btn-primary" onclick="printOrdersList()"
                    style="height: 42px; flex:1; background:#6366f1;"><i class="fa-solid fa-print"></i> طباعة السجل</button>
            </div>
        </div>

        <!-- Orders Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>رقم الطلب</th>
                        <th>التاريخ</th>
                        <th>العميل</th>
                        <th>الأصناف</th>
                        <th>المجموع</th>
                        <th>الحالة</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="orders-tbody">
                    <!-- Dynamic -->
                </tbody>
            </table>
        </div>
        
        <!-- Pagination Controls -->
        <div id="pagination-container" style="display:flex; justify-content:center; gap:8px; margin-top:20px; margin-bottom:40px; flex-wrap:wrap;">
            <!-- Dynamic Buttons -->
        </div>

        <!-- Order Details Modal -->
        <div class="modal-overlay" id="order-details-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title"><i class="fa-solid fa-magnifying-glass"></i> تفاصيل الطلب</h3>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <button id="print-order-btn" class="btn btn-primary"
                            style="padding:5px 12px; background:#6366f1; border:none; border-radius:6px; color:white; font-family:'Cairo', sans-serif; cursor:pointer;"><i class="fa-solid fa-print"></i>
                            طباعة</button>
                        <button onclick="closeModal()"
                            style="background:none; border:none; font-size:1.8rem; cursor:pointer; color:#94a3b8;">&times;</button>
                    </div>
                </div>
                <div class="modal-body" id="modal-body-content">
                    <!-- Dynamic -->
                </div>
                <div
                    style="padding: 1.5rem; background: #f8fafc; border-top: 1px solid #f1f5f9; text-align: left; display: flex; justify-content: flex-end; gap:10px;">
                    <button class="btn btn-primary" id="print-order-btn">
                        <i class="fa-solid fa-print"></i> طباعة الفاتورة
                    </button>
                    <button class="btn btn-secondary" onclick="closeModal()">إغلاق</button>
                </div>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tbody = document.getElementById('orders-tbody');
            const searchInput = document.getElementById('order-search'); // Changed ID
            const statusFilter = document.getElementById('status-filter');
            const dateFrom = document.getElementById('date-from');
            const dateTo = document.getElementById('date-to');
            let currentPage = 1;
            const itemsPerPage = 30;

            // Stats Elements
            const statCompleted = document.getElementById('stat-completed');
            const statScheduled = document.getElementById('stat-scheduled');
            const statDelivery = document.getElementById('stat-delivery');
            const statReturned = document.getElementById('stat-returned');

            function renderOrders() {
                let orders = store.data.orders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                const search = searchInput.value.toLowerCase();
                const status = statusFilter.value;
                const from = dateFrom.value ? new Date(dateFrom.value) : null;
                const to = dateTo.value ? new Date(dateTo.value) : null;
                if (to) to.setHours(23, 59, 59);

                // Filter Logic
                const filtered = orders.filter(o => {
                    // Search
                    const matchSearch = o.customerName.toLowerCase().includes(search) || o.id.includes(search);
                    if (!matchSearch) return false;

                    // Status
                    if (status !== 'ALL') {
                        const isScheduled = o.isScheduled === true || o.isScheduled === 'true' || o.status === 'SCHEDULED';
                        if (status === 'SCHEDULED' && (!isScheduled || o.status === 'IN_DELIVERY')) return false;
                        if (status === 'IN_DELIVERY' && o.status !== 'IN_DELIVERY') return false;
                        if (status === 'COMPLETED') {
                            if (isScheduled) return false;
                            if (o.status !== 'COMPLETED' && o.status !== 'DELIVERED') return false;
                        }
                        if (status === 'RETURNED' && o.status !== 'RETURNED') return false;
                        if (status === 'CANCELLED' && o.status !== 'CANCELLED') return false;
                    }

                    // Date
                    const d = new Date(o.createdAt);
                    if (from && d < from) return false;
                    if (to && d > to) return false;

                    return true;
                });

                // Update Stats
                statCompleted.textContent = orders.filter(o => (o.status === 'COMPLETED' || o.status === 'DELIVERED') && !(o.isScheduled === true || o.isScheduled === 'true' || o.status === 'SCHEDULED' || o.status === 'IN_DELIVERY')).length;
                statScheduled.textContent = orders.filter(o => (o.isScheduled === true || o.isScheduled === 'true' || o.status === 'SCHEDULED') && o.status !== 'IN_DELIVERY').length;
                statDelivery.textContent = orders.filter(o => o.status === 'IN_DELIVERY').length;
                statReturned.textContent = orders.filter(o => o.status === 'RETURNED').length;

                tbody.innerHTML = '';
                
                // Pagination Logic
                const totalItems = filtered.length;
                const totalPages = Math.ceil(totalItems / itemsPerPage);
                
                if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
                if (currentPage < 1) currentPage = 1;

                const startIdx = (currentPage - 1) * itemsPerPage;
                const paginatedItems = filtered.slice(startIdx, startIdx + itemsPerPage);

                paginatedItems.forEach(o => {
                    const tr = document.createElement('tr');

                    let statusHtml = '';
                    const isScheduled = o.isScheduled === true || o.isScheduled === 'true' || o.status === 'SCHEDULED';

                    if (o.status === 'CANCELLED') statusHtml = '<span class="status-badge status-cancelled">ملغي</span>';
                    else if (o.status === 'RETURNED') statusHtml = '<span class="status-badge status-returned">مرتجع</span>';
                    else if (o.status === 'IN_DELIVERY') statusHtml = '<span class="status-badge status-delivery"><i class="fa-solid fa-truck"></i> قيد التوصيل</span>';
                    else if (isScheduled) statusHtml = '<span class="status-badge status-scheduled"><i class="fa-solid fa-calendar-day"></i> مؤجل</span>';
                    else if (o.status === 'COMPLETED' || o.status === 'DELIVERED') statusHtml = '<span class="status-badge status-active"><i class="fa-solid fa-circle-check"></i> مكتمل</span>';
                    else statusHtml = '<span class="status-badge status-active"><i class="fa-solid fa-circle-check"></i> مكتمل</span>'; // Fallback

                    let actionsHtml = '';

                    if (o.status === 'CANCELLED' || o.status === 'RETURNED') {
                        actionsHtml = `<button class="btn btn-danger" onclick="deleteOrder('${o.id}', event)" title="حذف نهائي"><i class="fa-solid fa-trash-can"></i></button>`;
                    } else {
                        // Action buttons for active orders
                        actionsHtml += `<button class="btn btn-primary" onclick="updateStatus('${o.id}', 'IN_DELIVERY', event)" style="padding:4px 8px; font-size:0.7rem;" title="شحن"><i class="fa-solid fa-truck"></i></button>`;
                        actionsHtml += `<button class="btn btn-success" onclick="updateStatus('${o.id}', 'DELIVERED', event)" style="padding:4px 8px; font-size:0.7rem;" title="إتمام"><i class="fa-solid fa-circle-check"></i></button>`;
                        actionsHtml += `<button class="btn" style="background:#f97316; color:white; padding:4px 8px; font-size:0.7rem;" onclick="updateStatus('${o.id}', 'RETURNED', event)" title="إرجاع"><i class="fa-solid fa-rotate-left"></i></button>`;
                        actionsHtml += `
                            <button class="btn btn-secondary" onclick="confirmEdit('${o.id}', event)" title="تعديل"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button class="btn btn-danger" onclick="cancelOrder('${o.id}', event)" title="إلغاء"><i class="fa-solid fa-xmark"></i></button>
                        `;
                    }

                    const displayId = o.id.toString().startsWith('A-') ? o.id : '#' + o.id.toString().substr(-8);

                    tr.innerHTML = `
                        <td style="font-family:monospace; font-size:0.85rem; color:var(--primary-color); cursor:pointer;" onclick="viewDetails('${o.id}')">${displayId} <i class="fa-solid fa-eye"></i></td>
                        <td style="font-size:0.85rem;">${new Date(o.createdAt).toLocaleDateString('ar-EG')}</td>
                        <td style="font-weight:bold;">${o.customerName}</td>
                        <td class="ord-items-list" title="${o.itemsText}">${o.itemsText || '-'}</td>
                        <td style="font-weight:800; color:var(--primary-color);">${UI.formatMoney(o.total, o.currency)}</td>
                        <td>${statusHtml}</td>
                        <td class="actions-cell">${actionsHtml}</td>
                    `;
                    tbody.appendChild(tr);
                });

                renderPagination(totalPages);

                if (filtered.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:3rem; color:#999;">لا توجد طلبات مطابقة للبحث</td></tr>';
                    document.getElementById('pagination-container').innerHTML = '';
                }

                // Store for printing
                window.lastFilteredOrders = filtered;
            }

            function renderPagination(totalPages) {
                const pagContainer = document.getElementById('pagination-container');
                pagContainer.innerHTML = '';
                if (totalPages <= 1) return;

                // Prev
                const prevBtn = document.createElement('button');
                prevBtn.className = 'btn btn-secondary';
                prevBtn.innerHTML = '<i class="fa-solid fa-chevron-right"></i>';
                prevBtn.disabled = currentPage === 1;
                prevBtn.onclick = () => { currentPage--; renderOrders(); window.scrollTo({top:0, behavior:'smooth'}); };
                pagContainer.appendChild(prevBtn);

                // Pages
                let startPage = Math.max(1, currentPage - 2);
                let endPage = Math.min(totalPages, startPage + 4);
                if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

                for (let i = startPage; i <= endPage; i++) {
                    const btn = document.createElement('button');
                    btn.className = i === currentPage ? 'btn btn-primary' : 'btn btn-secondary';
                    btn.style.minWidth = '40px';
                    btn.textContent = i;
                    btn.onclick = () => { currentPage = i; renderOrders(); window.scrollTo({top:0, behavior:'smooth'}); };
                    pagContainer.appendChild(btn);
                }

                // Next
                const nextBtn = document.createElement('button');
                nextBtn.className = 'btn btn-secondary';
                nextBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
                nextBtn.disabled = currentPage === totalPages;
                nextBtn.onclick = () => { currentPage++; renderOrders(); window.scrollTo({top:0, behavior:'smooth'}); };
                pagContainer.appendChild(nextBtn);
            }

            // Listeners
            [searchInput, statusFilter, dateFrom, dateTo].forEach(el => el.addEventListener('input', () => {
                currentPage = 1;
                renderOrders();
            }));

            window.resetFilters = () => {
                searchInput.value = '';
                statusFilter.value = 'ALL';
                dateFrom.value = ''; dateTo.value = '';
                currentPage = 1;
                renderOrders();
            };

            // Status Management
            window.updateStatus = (id, newStatus, event) => {
                if (event) event.stopPropagation();
                const labels = { 'IN_DELIVERY': 'قيد التوصيل', 'DELIVERED': 'واصل/تسليم', 'RETURNED': 'مرتجع', 'SCHEDULED': 'إعادة للتأجيل' };
                UI.confirm(`تحويل الطلب إلى ${labels[newStatus]}؟`, 'تغيير الحالة', () => {
                    store.updateOrderStatus(id, newStatus);
                    renderOrders();
                });
            };

            // Order Details Modal
            const modal = document.getElementById('order-details-modal');
            const modalBody = document.getElementById('modal-body-content');

            window.viewDetails = (id) => {
                const o = store.data.orders.find(ord => ord.id === id);
                if (!o) return;

                // Set print button
                const printBtn = modal.querySelector('#print-order-btn'); // Select print button within the modal
                if (printBtn) printBtn.onclick = () => UI.printOrder(id);

                const cust = store.data.customers.find(c => c.id === o.customerId) || { phone: '-', address: '-' };

                let itemsHtml = '';
                if (o.cartItems) {
                    o.cartItems.forEach(item => {
                        const itemImg = UI.getItemImage(item.name, item);

                        itemsHtml += `
                            <tr>
                                <td style="width: 60px;">
                                    ${itemImg ? `<img src="${itemImg}" class="item-thumb">` : '<div class="item-thumb-placeholder"><i class="fa-solid fa-image"></i></div>'}
                                </td>
                                <td>${item.name}</td>
                                <td>1</td>
                                <td>${UI.formatMoney(item.price, o.currency)}</td>
                                <td style="font-weight:bold;">${UI.formatMoney(item.price, o.currency)}</td>
                            </tr>
                        `;
                    });
                } else if (o.itemsText) {
                    itemsHtml = `<tr><td colspan="4">${o.itemsText}</td></tr>`;
                }

                let statusHtml = '';
                if (o.status === 'CANCELLED') statusHtml = '<span style="background:#fee2e2; color:#991b1b; padding:4px 10px; border-radius:30px; font-size:0.8rem; font-weight:bold;">ملغي</span>';
                else if (o.status === 'RETURNED') statusHtml = '<span style="background:#fef3c7; color:#9141ac; padding:4px 10px; border-radius:30px; font-size:0.8rem; font-weight:bold;">مرتجع</span>';
                else if (o.isScheduled || o.status === 'SCHEDULED') {
                    const d = new Date(o.date);
                    statusHtml = `<span style="background:#fffbeb; color:#92400e; padding:4px 10px; border-radius:30px; font-size:0.8rem; font-weight:bold;"><i class="fa-solid fa-calendar-day"></i> مؤجل (${d.toLocaleDateString('ar-EG', { day: 'numeric', month: 'short' })})</span>`;
                }
                else if (o.status === 'IN_DELIVERY') statusHtml = '<span style="background:#e0f2fe; color:#075985; padding:4px 10px; border-radius:30px; font-size:0.8rem; font-weight:bold;"><i class="fa-solid fa-truck"></i> قيد التوصيل</span>';
                else if (o.status === 'COMPLETED' || o.status === 'DELIVERED') statusHtml = '<span style="background:#d1fae5; color:#065f46; padding:4px 10px; border-radius:30px; font-size:0.8rem; font-weight:bold;"><i class="fa-solid fa-circle-check"></i> مكتمل</span>';
                else statusHtml = '<span style="background:#d1fae5; color:#065f46; padding:4px 10px; border-radius:30px; font-size:0.8rem; font-weight:bold;"><i class="fa-solid fa-circle-check"></i> مكتمل</span>';

                modalBody.innerHTML = `
                    <div class="detail-section">
                        <div class="detail-title"><i class="fa-solid fa-circle-info"></i> حالة الطلب</div>
                        <div style="padding:10px; background:#f8fafc; border-radius:8px;">${statusHtml}</div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-title"><i class="fa-solid fa-user-tag"></i> معلومات العميل</div>
                        <div class="detail-row"><span class="lbl">الاسم:</span> <span class="val">${o.customerName}</span></div>
                        <div class="detail-row"><span class="lbl">الهاتف:</span> <span class="val">${cust.phone || '-'}</span></div>
                        <div class="detail-row"><span class="lbl">العنوان:</span> <span class="val">${cust.address || '-'}</span></div>
                    </div>

                    <div class="detail-section">
                        <div class="detail-title"><i class="fa-solid fa-cart-shopping"></i> المنتجات</div>
                        <table class="items-table">
                            <thead>
                                <tr><th>الصورة</th><th>الصنف</th><th>الكمية</th><th>السعر</th><th>المجموع</th></tr>
                            </thead>
                            <tbody>${itemsHtml}</tbody>
                        </table>
                    </div>

                    <div class="detail-section">
                        <div class="detail-title"><i class="fa-solid fa-sack-dollar"></i> الملخص المالي</div>
                        <div class="detail-row"><span class="lbl">المجموع الفرعي:</span> <span class="val">${UI.formatMoney(o.subtotal || 0, o.currency)}</span></div>
                        <div class="detail-row"><span class="lbl">التوصيل:</span> <span class="val">${UI.formatMoney(o.delivery || 0, o.currency)}</span></div>
                        <div class="detail-row"><span class="lbl">الخصم:</span> <span class="val" style="color:red;">-${UI.formatMoney(o.discount || 0, o.currency)}</span></div>
                        <div class="detail-row" style="font-size:1.2rem; margin-top:10px; border-top:1px dashed #ddd; padding-top:10px;">
                            <span class="lbl" style="font-weight:900; color:#333;">المبلغ الإجمالي:</span>
                            <span class="val" style="color:var(--primary-color); font-size:1.4rem;">${UI.formatMoney(o.total, o.currency)}</span>
                        </div>
                    </div>

                    <div class="detail-section">
                        <div class="detail-title"><i class="fa-solid fa-pen-nib"></i> ملاحظات</div>
                        <div style="background:#f8fafc; padding:10px; border-radius:8px; font-size:0.9rem; color:#64748b;">
                            ${o.notes || 'لا توجد ملاحظات'}
                        </div>
                    </div>
                `;
                modal.classList.add('active');
            };

            window.closeModal = () => modal.classList.remove('active');

            // Global Actions
            window.cancelOrder = (id, event) => {
                if (event) event.stopPropagation();
                UI.confirm('هل أنت متأكد من إلغاء الطلب؟', 'إلغاء الطلب', () => {
                    store.cancelOrder(id);
                    renderOrders();
                });
            };

            window.deleteOrder = (id, event) => {
                if (event) event.stopPropagation();
                UI.confirm('⚠️ حذف نهائي للطلب؟ لا يمكن التراجع.', 'حذف نهائي', () => {
                    store.deleteOrder(id);
                    renderOrders();
                });
            };

            window.confirmEdit = (id, event) => {
                if (event) event.stopPropagation();
                UI.confirm('تعديل هذا الطلب؟ سيتم إلغاء الطلب الحالي.', 'تعديل', () => {
                    window.location.href = `orders.html?editId=${id}`;
                });
            };

            window.printOrdersList = () => {
                const orders = window.lastFilteredOrders || [];
                if (orders.length === 0) {
                    alert('لا توجد طلبات لطباعتها');
                    return;
                }

                const brand = store.getBranding();
                const logoHtml = brand.logo
                    ? `<img src="${brand.logo}" style="height:60px; margin-bottom:10px;">`
                    : '';

                let rowsHtml = '';
                orders.forEach(o => {
                    rowsHtml += `
                        <tr>
                            <td style="font-family:monospace;">#${o.id.substr(-8)}</td>
                            <td>${new Date(o.createdAt).toLocaleDateString('ar-EG')} ${new Date(o.createdAt).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' })}</td>
                            <td>${o.customerName}</td>
                            <td style="font-size:0.8rem;">${o.itemsText || '-'}</td>
                            <td style="font-weight:bold;">${UI.formatMoney(o.total, o.currency)}</td>
                        </tr>
                    `;
                });

                const printWindow = window.open('', '_blank');
                const content = `
                    <html dir="rtl" lang="ar">
                    <head>
                        <title>تقرير سجل الطلبات - ${new Date().toLocaleDateString()}</title>
                        <style>
                            @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
                            body { font-family: 'Cairo', sans-serif; padding: 40px; color: #333; }
                            .header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
                            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                            th, td { border: 1px solid #eee; padding: 12px; text-align: right; }
                            th { background: #f8f9fa; font-weight: 700; }
                            .footer { margin-top: 50px; text-align: center; font-size: 0.9rem; color: #777; border-top: 1px solid #eee; padding-top: 20px; }
                        </style>
                    </head>
                    <body>
                        <div class="header">
                            ${logoHtml}
                            <h1 style="margin:5px 0;">سجل طلبات ${brand.name}</h1>
                            <p>تقرير ملخص الطلبات - استخراج في: ${new Date().toLocaleString('ar-EG')}</p>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>رقم الطلب</th>
                                    <th>التاريخ</th>
                                    <th>العميل</th>
                                    <th>الأصناف</th>
                                    <th>المجموع</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rowsHtml}
                            </tbody>
                        </table>
                        <div class="footer">
                            <p>عدد الطلبات المطبوعة: ${orders.length}</p>
                            <p>شكراً لاستخدامكم نظامنا المالي</p>
                        </div>
                        <script>window.print(); setTimeout(() => window.close(), 500);<\/script>
                    </body>
                    </html>
                `;
                printWindow.document.write(content);
                printWindow.document.close();
            };

            window.exportToExcel = () => {
                const orders = window.lastFilteredOrders || store.data.orders || [];
                if (orders.length === 0) {
                    alert('لا توجد بيانات لتصديرها');
                    return;
                }

                try {
                    const data = orders.map(o => ({
                        'رقم الطلب': o.id,
                        'التاريخ': new Date(o.createdAt).toLocaleDateString('ar-EG'),
                        'العميل': o.customerName,
                        'الأصناف': o.itemsText || '-',
                        'المجموع': o.total,
                        'العملة': o.currency,
                        'الحالة': o.status === 'CANCELLED' ? 'ملغي' :
                            o.status === 'RETURNED' ? 'مرتجع' :
                                (o.isScheduled || o.status === 'SCHEDULED') ? 'مؤجل' :
                                    o.status === 'IN_DELIVERY' ? 'قيد التوصيل' : 'مكتمل'
                    }));

                    const ws = XLSX.utils.json_to_sheet(data);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "الطلبات");
                    XLSX.writeFile(wb, "orders_history.xlsx");
                } catch (err) {
                    alert('حدث خطأ أثناء التصدير: ' + err.message);
                }
            };

            renderOrders();
        });
    </script>
</body>

</html>
